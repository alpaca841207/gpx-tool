<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GPX Tool Auto Detect</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
html,body{height:100%;margin:0;background:#07140d;color:#d8ffe0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
#app{height:100%;display:grid;grid-template-columns:390px 1fr}
#left{background:#06140b;border-right:1px solid #1e5b35;padding:12px;overflow:auto}
#map{height:100%;width:100%;background:#111}
h1{font-size:16px;margin:0 0 10px;color:#7dff9a;letter-spacing:.08em}
.box{border:1px solid #245d39;border-radius:10px;background:#0b2012;padding:10px;margin-bottom:10px}
label{display:block;font-size:13px;color:#a7d7b2;margin-top:8px}
input,select,button,textarea{width:100%;box-sizing:border-box;margin-top:5px;padding:9px;border-radius:7px;border:1px solid #2e6b43;background:#0d1e13;color:#e9fff0}
button{background:#136b32;border-color:#2ea44f;font-weight:700;cursor:pointer}
button.secondary{background:#17291d;border-color:#375b42}
button.danger{background:#5b1616;border-color:#9a2d2d}
textarea{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px}
.status{font-size:12px;line-height:1.45;background:#07140d;border:1px solid #2e6b43;border-radius:8px;padding:8px;margin-top:8px;color:#c7ffd4}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.drop{border:2px dashed #2e6b43;border-radius:10px;background:#07140d;color:#9bcda6;text-align:center;padding:14px;margin-top:6px}
.marker-dot{width:24px;height:24px;border-radius:50%;color:#fff;border:2px solid #baffc7;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;box-shadow:0 0 10px #000}
.seed{background:#16a34a}.bud{background:#d4a017}.flower{background:#d946ef}.blue{background:#075bff}.manual{background:#0d7d38}.cal{background:#e11}
.leaflet-control-layers,.leaflet-control-zoom{filter:invert(.85) hue-rotate(75deg)}
.small{font-size:12px;color:#9bcda6;line-height:1.45}
</style>
</head>
<body>
<div id="app">
<aside id="left">
<h1>GPX TOOL｜AUTO DETECT</h1>
<div class="box">
<label>地圖中心座標</label><input id="centerInput" value="37.196446,36.577787" placeholder="lat,lng">
<div class="row"><button id="goBtn">前往座標</button><button id="addCenterBtn" class="secondary">中心加點</button></div>
<label>縮放層級</label><select id="zoomSel"><option>14</option><option>15</option><option>16</option><option selected>17</option><option>18</option><option>19</option></select>
<button id="setZoomBtn" class="secondary">套用縮放</button>
</div>
<div class="box">
<label>截圖來源</label><input id="fileInput" type="file" accept="image/*">
<div id="drop" class="drop">可拖放圖片，或複製截圖後貼上</div>
<label>截圖透明度</label><input id="overlayOpacity" type="range" min="0.1" max="1" step="0.05" value="0.55">
<div class="status" id="imgStatus">尚未載入截圖</div>
</div>
<div class="box">
<label>3點校正：先點截圖 A/B/C，再點地圖 A/B/C</label>
<div class="row"><button id="pickImgBtn" class="secondary">點截圖控制點</button><button id="pickMapBtn" class="secondary">點地圖控制點</button></div>
<div class="row"><button id="applyCalBtn">套用校正</button><button id="clearCalBtn" class="danger">清除校正</button></div>
<div class="status" id="calStatus">截圖點 0 / 地圖點 0</div>
</div>
<div class="box">
<label>自動辨識</label>
<select id="detectMode"><option value="blue">藍點標記模式（最準）</option><option value="all">全部：花苗+花苞+花朵</option><option value="seed">只辨識花苗</option><option value="bud">只辨識花苞</option><option value="flower">只辨識花朵</option></select>
<div class="row3"><div><label>最小面積</label><input id="minArea" type="number" value="18"></div><div><label>最大面積</label><input id="maxArea" type="number" value="1800"></div><div><label>去重px</label><input id="mergePx" type="number" value="22"></div></div>
<button id="detectBtn">自動辨識並加到地圖</button>
<div class="row"><button id="toggleManualBtn" class="secondary">手動標點 開/關</button><button id="clearPointsBtn" class="danger">清除點位</button></div>
<div class="status" id="pointStatus">點位 0</div>
</div>
<div class="box">
<label>路徑排序</label><select id="sortMode"><option value="none">維持目前順序</option><option value="nearest">最近鄰排序</option><option value="center">由中心向外</option></select>
<label>起點座標，可留空</label><input id="startCoord" placeholder="lat,lng">
<div class="row"><button id="sortBtn" class="secondary">套用排序</button><button id="reverseBtn" class="secondary">反轉順序</button></div>
</div>
<div class="box">
<label>GPX 生成設定</label><input id="fileName" value="generated_route" placeholder="檔名">
<label>GPX 類型</label><select id="gpxType"><option value="wpt">Waypoint 點位</option><option value="rte">Route 路線</option><option value="trk">Track 軌跡</option><option value="both">Waypoint + Route</option></select>
<label>路徑功能</label><select id="routeMode"><option value="normal">單向路徑</option><option value="return">反向路徑（逆行回去）</option></select>
<label>Waypoint 形狀</label><select id="shapeMode"><option value="center">僅中心點</option><option value="pentagon">五邊形繞點</option><option value="octagon">八邊形繞點</option></select>
<label>繞點半徑/m</label><input id="radiusM" type="number" value="20">
<div class="row"><button id="makeGpxBtn">生成 GPX</button><button id="downloadGpxBtn" class="secondary">下載 GPX</button></div>
</div>
<div class="box">
<label>GPS 座標</label><button id="copyCoordsBtn" class="secondary">複製座標</button><textarea id="coordsOut" rows="8"></textarea>
<label>GPX</label><button id="copyGpxBtn" class="secondary">複製 GPX</button><textarea id="gpxOut" rows="12"></textarea>
<div class="status" id="gpxStatus">尚未生成 GPX</div>
</div>
<div class="box small">右鍵/長按點位可刪除；拖曳點位可微調。顏色：綠=花苗、黃=花苞、粉=花朵、藍=藍點、深綠=手動點。</div>
</aside>
<main id="map"></main>
</div>
<script>
const $=id=>document.getElementById(id);
let points=[],markers=[],line=null,overlay=null,imgObj=null,imageCalib=[],mapCalib=[],calibMarkers=[],pickingImg=false,pickingMap=false,manualMode=false,imgToGps=null;
function parseCoord(s){const a=s.split(',').map(v=>Number(v.trim()));if(a.length!==2||a.some(v=>!Number.isFinite(v)))throw Error('座標格式需為 lat,lng');return L.latLng(a[0],a[1]);}
function f(n){return Number(n).toFixed(6)}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&apos;'}[c]))}
const init=parseCoord($('centerInput').value),map=L.map('map',{zoomControl:true}).setView(init,17);
const layers={'OSM Standard':L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:20,attribution:'© OpenStreetMap'}),'Carto Light':L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',{maxZoom:20}),'Carto Dark':L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',{maxZoom:20})};
layers['OSM Standard'].addTo(map);L.control.layers(layers,null,{collapsed:false,position:'topright'}).addTo(map);
function icon(type,i){return L.divIcon({className:'',html:`<div class="marker-dot ${type||'manual'}">${i||''}</div>`,iconSize:[24,24],iconAnchor:[12,12]})}
function refresh(){markers.forEach(m=>m.remove());markers=[];if(line)line.remove();points.forEach((p,i)=>{const m=L.marker([p.lat,p.lng],{icon:icon(p.type,i+1),draggable:true}).addTo(map);m.on('dragend',e=>{const ll=e.target.getLatLng();p.lat=ll.lat;p.lng=ll.lng;refresh()});m.on('contextmenu',()=>{points.splice(i,1);refresh()});markers.push(m)});if(points.length>1)line=L.polyline(points.map(p=>[p.lat,p.lng]),{color:'#00ff66',weight:3,opacity:.8}).addTo(map);$('pointStatus').textContent=`點位 ${points.length}｜苗 ${points.filter(p=>p.type==='seed').length} / 苞 ${points.filter(p=>p.type==='bud').length} / 花 ${points.filter(p=>p.type==='flower').length} / 藍 ${points.filter(p=>p.type==='blue').length}`;$('coordsOut').value=points.map(p=>`${f(p.lat)},${f(p.lng)}`).join('\n')}
function addPoint(ll,type='manual'){points.push({lat:ll.lat,lng:ll.lng,type});refresh()}
$('goBtn').onclick=()=>{try{map.setView(parseCoord($('centerInput').value),Number($('zoomSel').value))}catch(e){alert(e.message)}};
$('setZoomBtn').onclick=()=>map.setZoom(Number($('zoomSel').value));$('addCenterBtn').onclick=()=>addPoint(map.getCenter());
$('toggleManualBtn').onclick=()=>{manualMode=!manualMode;pickingImg=false;pickingMap=false;$('pointStatus').textContent=manualMode?'手動標點中：點地圖新增點':`點位 ${points.length}`};
$('clearPointsBtn').onclick=()=>{points=[];refresh();$('gpxOut').value=''};$('reverseBtn').onclick=()=>{points.reverse();refresh()};
map.on('click',e=>{if(pickingImg){pickImageCalib(e.latlng);return}if(pickingMap){pickMapCalib(e.latlng);return}if(manualMode)addPoint(e.latlng,'manual')});
function placeOverlay(url){imgObj=new Image();imgObj.onload=()=>{const c=map.getCenter(),z=map.getZoom(),mpp=156543.03392*Math.cos(c.lat*Math.PI/180)/Math.pow(2,z),wM=imgObj.width*mpp*.65,hM=imgObj.height*mpp*.65,dLat=(hM/2)/111320,dLng=(wM/2)/(111320*Math.cos(c.lat*Math.PI/180)),b=L.latLngBounds([[c.lat-dLat,c.lng-dLng],[c.lat+dLat,c.lng+dLng]]);if(overlay)overlay.remove();overlay=L.imageOverlay(url,b,{opacity:Number($('overlayOpacity').value),interactive:false}).addTo(map);map.fitBounds(b);imageCalib=[];mapCalib=[];imgToGps=null;clearCalMarkers();$('imgStatus').textContent=`已載入截圖：${imgObj.width} × ${imgObj.height}`;updateCalStatus()};imgObj.src=url}
function loadFile(file){if(!file||!file.type.startsWith('image/')){alert('請提供圖片');return}const r=new FileReader();r.onload=e=>placeOverlay(e.target.result);r.readAsDataURL(file)}
$('fileInput').onchange=e=>loadFile(e.target.files[0]);$('drop').ondragover=e=>e.preventDefault();$('drop').ondrop=e=>{e.preventDefault();loadFile(e.dataTransfer.files[0])};document.addEventListener('paste',e=>{for(const it of e.clipboardData.items){if(it.type.startsWith('image/')){loadFile(it.getAsFile());e.preventDefault();return}}});$('overlayOpacity').oninput=()=>{if(overlay)overlay.setOpacity(Number($('overlayOpacity').value))};
function clearCalMarkers(){calibMarkers.forEach(m=>m.remove());calibMarkers=[]}function updateCalStatus(){$('calStatus').textContent=`截圖點 ${imageCalib.length} / 地圖點 ${mapCalib.length}`}
function imagePixelFromLatLng(ll){const b=overlay.getBounds(),sw=b.getSouthWest(),ne=b.getNorthEast();return{x:(ll.lng-sw.lng)/(ne.lng-sw.lng)*imgObj.width,y:(ne.lat-ll.lat)/(ne.lat-sw.lat)*imgObj.height}}
function pickImageCalib(ll){if(!overlay||!overlay.getBounds().contains(ll)){alert('請點在截圖覆蓋範圍內');return}if(imageCalib.length>=3)return;imageCalib.push(imagePixelFromLatLng(ll));calibMarkers.push(L.marker(ll,{icon:icon('cal',['A圖','B圖','C圖'][imageCalib.length-1])}).addTo(map));updateCalStatus()}
function pickMapCalib(ll){if(mapCalib.length>=3)return;mapCalib.push({lat:ll.lat,lng:ll.lng});calibMarkers.push(L.marker(ll,{icon:icon('cal',['A地','B地','C地'][mapCalib.length-1])}).addTo(map));updateCalStatus()}
$('pickImgBtn').onclick=()=>{pickingImg=!pickingImg;pickingMap=false;manualMode=false};$('pickMapBtn').onclick=()=>{pickingMap=!pickingMap;pickingImg=false;manualMode=false};$('clearCalBtn').onclick=()=>{imageCalib=[];mapCalib=[];imgToGps=null;clearCalMarkers();updateCalStatus()};
function affine(src,dst){const[p1,p2,p3]=src,x1=p1.x,y1=p1.y,x2=p2.x,y2=p2.y,x3=p3.x,y3=p3.y,det=x1*(y2-y3)-y1*(x2-x3)+(x2*y3-x3*y2);if(Math.abs(det)<1e-9)throw Error('三個截圖控制點不可共線');function cf(vals){const[v1,v2,v3]=vals;return{a:(v1*(y2-y3)-y1*(v2-v3)+(v2*y3-v3*y2))/det,b:(x1*(v2-v3)-v1*(x2-x3)+(x2*v3-x3*v2))/det,c:(x1*(y3*v2-y2*v3)-y1*(x3*v2-x2*v3)+(x2*y3-x3*y2)*v1)/det}}const A=cf(dst.map(q=>q.lat)),B=cf(dst.map(q=>q.lng));return(x,y)=>({lat:A.a*x+A.b*y+A.c,lng:B.a*x+B.b*y+B.c})}
$('applyCalBtn').onclick=()=>{try{if(imageCalib.length<3||mapCalib.length<3)throw Error('需要截圖3點 + 地圖3點');imgToGps=affine(imageCalib,mapCalib);alert('已套用校正，可開始自動辨識。')}catch(e){alert(e.message)}};
function rgb2hsv(r,g,b){r/=255;g/=255;b/=255;let mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn,h=0;if(d){if(mx===r)h=((g-b)/d)%6;else if(mx===g)h=(b-r)/d+2;else h=(r-g)/d+4;h*=60;if(h<0)h+=360}return{h,s:mx?d/mx:0,v:mx}}
function classOf(r,g,b,mode){const hsv=rgb2hsv(r,g,b),h=hsv.h,s=hsv.s,v=hsv.v;if(mode==='blue')return(b>90&&b>r*1.35&&b>g*1.15&&r<115&&g<175)?'blue':null;const seed=(h>=65&&h<=165&&s>.22&&v>.28&&g>r*1.05&&g>b*.75),bud=((h>=38&&h<=65&&s>.28&&v>.42)||(r>150&&g>125&&b<105&&r/g<1.45)),flower=((h>=300||h<=25)&&s>.22&&v>.45&&r>120&&b>75)||(r>160&&b>120&&g<150);if(mode==='seed')return seed?'seed':null;if(mode==='bud')return bud?'bud':null;if(mode==='flower')return flower?'flower':null;if(flower)return'flower';if(bud)return'bud';if(seed)return'seed';return null}
$('detectBtn').onclick=()=>{if(!imgObj||!imgToGps){alert('請先載入截圖並完成3點校正');return}const mode=$('detectMode').value,minA=Number($('minArea').value)||8,maxA=Number($('maxArea').value)||2000,merge=Number($('mergePx').value)||20,c=document.createElement('canvas');c.width=imgObj.width;c.height=imgObj.height;const ctx=c.getContext('2d');ctx.drawImage(imgObj,0,0);const data=ctx.getImageData(0,0,c.width,c.height),w=c.width,h=c.height,vis=new Uint8Array(w*h),comps=[];for(let y=0;y<h;y++)for(let x=0;x<w;x++){const id=y*w+x;if(vis[id])continue;let i=id*4,t=classOf(data.data[i],data.data[i+1],data.data[i+2],mode);if(!t){vis[id]=1;continue}let q=[[x,y]],qi=0,n=0,sx=0,sy=0,minx=x,maxx=x,miny=y,maxy=y,counts={seed:0,bud:0,flower:0,blue:0};vis[id]=1;while(qi<q.length){const[cx,cy]=q[qi++];n++;sx+=cx;sy+=cy;minx=Math.min(minx,cx);maxx=Math.max(maxx,cx);miny=Math.min(miny,cy);maxy=Math.max(maxy,cy);const ii=(cy*w+cx)*4,tt=classOf(data.data[ii],data.data[ii+1],data.data[ii+2],mode);if(tt)counts[tt]++;for(const[dx,dy]of[[1,0],[-1,0],[0,1],[0,-1]]){const nx=cx+dx,ny=cy+dy;if(nx<0||ny<0||nx>=w||ny>=h)continue;const ni=ny*w+nx;if(vis[ni])continue;const jj=ni*4,nt=classOf(data.data[jj],data.data[jj+1],data.data[jj+2],mode);vis[ni]=1;if(nt)q.push([nx,ny])}}const bw=maxx-minx+1,bh=maxy-miny+1,ratio=Math.max(bw,bh)/Math.max(1,Math.min(bw,bh));if(n>=minA&&n<=maxA&&ratio<5.5){const type=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];comps.push({x:sx/n,y:sy/n,n,type})}}comps.sort((a,b)=>b.n-a.n);const fs=[];for(const p of comps)if(!fs.some(q=>Math.hypot(q.x-p.x,q.y-p.y)<merge))fs.push(p);fs.forEach(p=>{const g=imgToGps(p.x,p.y);points.push({lat:g.lat,lng:g.lng,type:p.type})});refresh()};
function dist(a,b){const R=6371000,p1=a.lat*Math.PI/180,p2=b.lat*Math.PI/180,dp=(b.lat-a.lat)*Math.PI/180,dl=(b.lng-a.lng)*Math.PI/180,h=Math.sin(dp/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;return 2*R*Math.atan2(Math.sqrt(h),Math.sqrt(1-h))}
function centroid(arr){return{lat:arr.reduce((s,p)=>s+p.lat,0)/arr.length,lng:arr.reduce((s,p)=>s+p.lng,0)/arr.length}}
function nearest(arr,start){const rem=arr.slice(),out=[];let cur=start||rem.shift();if(!start)out.push(cur);while(rem.length){let bi=0,bd=1e99;rem.forEach((p,i)=>{const d=dist(cur,p);if(d<bd){bd=d;bi=i}});cur=rem.splice(bi,1)[0];out.push(cur)}return out}
$('sortBtn').onclick=()=>{let start=null;try{if($('startCoord').value.trim())start=parseCoord($('startCoord').value)}catch(e){alert(e.message);return}if($('sortMode').value==='nearest')points=nearest(points,start);if($('sortMode').value==='center'){const c=start||centroid(points);points.sort((a,b)=>dist(c,a)-dist(c,b))}refresh()};
function bearing(a,b){const y=Math.sin((b.lng-a.lng)*Math.PI/180)*Math.cos(b.lat*Math.PI/180),x=Math.cos(a.lat*Math.PI/180)*Math.sin(b.lat*Math.PI/180)-Math.sin(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.cos((b.lng-a.lng)*Math.PI/180);return(Math.atan2(y,x)*180/Math.PI+360)%360}
function offset(p,m,deg){const R=6378137,br=deg*Math.PI/180,la=p.lat*Math.PI/180,lo=p.lng*Math.PI/180,d=m/R,la2=Math.asin(Math.sin(la)*Math.cos(d)+Math.cos(la)*Math.sin(d)*Math.cos(br)),lo2=lo+Math.atan2(Math.sin(br)*Math.sin(d)*Math.cos(la),Math.cos(d)-Math.sin(la)*Math.sin(la2));return{lat:la2*180/Math.PI,lng:lo2*180/Math.PI,type:p.type}}
function expandShape(arr){const mode=$('shapeMode').value,r=Number($('radiusM').value)||0,out=[];arr.forEach((p,i)=>{const nb=arr[i+1]||arr[i-1]||p,br=Math.round(bearing(p,nb)/90)*90;if(mode==='center')out.push(p);else{const n=mode==='pentagon'?5:8;for(let k=0;k<n;k++)out.push(offset(p,r,br+k*360/n))}});return out}
function routePoints(){let base=points.slice();if($('routeMode').value==='return'&&base.length>1)base=base.concat(base.slice(0,-1).reverse());return expandShape(base)}
function makeGpx(){const arr=routePoints(),name=esc($('fileName').value||'route'),type=$('gpxType').value,now=new Date().toISOString();let s=`<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="GPX Tool Auto Detect" xmlns="http://www.topografix.com/GPX/1/1">\n<metadata><name>${name}</name><time>${now}</time></metadata>\n`;if(type==='wpt'||type==='both')arr.forEach((p,i)=>s+=`<wpt lat="${f(p.lat)}" lon="${f(p.lng)}"><name>P${i+1}</name></wpt>\n`);if(type==='rte'||type==='both'){s+=`<rte><name>${name}</name>\n`;arr.forEach((p,i)=>s+=`<rtept lat="${f(p.lat)}" lon="${f(p.lng)}"><name>P${i+1}</name></rtept>\n`);s+=`</rte>\n`}if(type==='trk'){s+=`<trk><name>${name}</name><trkseg>\n`;arr.forEach(p=>s+=`<trkpt lat="${f(p.lat)}" lon="${f(p.lng)}"></trkpt>\n`);s+=`</trkseg></trk>\n`}s+=`</gpx>\n`;return s}
$('makeGpxBtn').onclick=()=>{if(!points.length){alert('請先新增/辨識點位');return}$('gpxOut').value=makeGpx();$('gpxStatus').textContent=`已生成 ${routePoints().length} 個 GPX 點`};
$('copyCoordsBtn').onclick=()=>navigator.clipboard.writeText($('coordsOut').value);$('copyGpxBtn').onclick=()=>navigator.clipboard.writeText($('gpxOut').value);
$('downloadGpxBtn').onclick=()=>{if(!points.length){alert('請先新增/辨識點位');return}const text=$('gpxOut').value||makeGpx(),name=($('fileName').value||'route').replace(/[\\/:*?"<>|]/g,'_')+'.gpx',blob=new Blob([text],{type:'application/gpx+xml;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click()};
refresh();
</script>
</body>
</html>
