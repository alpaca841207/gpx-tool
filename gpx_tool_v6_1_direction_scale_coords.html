<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>GPX Tool v6 Integrated</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#07140d;--panel:#06140b;--box:#0b2012;--line:#245d39;--text:#d8ffe0;--muted:#9bcda6;--accent:#7dff9a;--btn:#136b32;--btn2:#17291d;--danger:#5b1616;--yellow:#ffd400}
*{box-sizing:border-box} html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC",sans-serif}
#app{height:100%;display:grid;grid-template-columns:420px 1fr} #left{background:var(--panel);border-right:1px solid #1e5b35;padding:12px;overflow:auto} #map{height:100%;background:#111;position:relative}
h1{font-size:16px;margin:0 0 10px;color:var(--accent);letter-spacing:.08em}.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}.tabbtn{background:#102817;color:var(--text);border:1px solid var(--line);border-radius:999px;padding:9px;font-weight:900}.tabbtn.active{background:var(--yellow);color:#111;border-color:#fff;box-shadow:0 0 12px var(--yellow)}
.view{display:none}.view.active{display:block}.box{border:1px solid var(--line);border-radius:10px;background:var(--box);padding:10px;margin-bottom:10px} label{display:block;font-size:13px;color:#a7d7b2;margin-top:8px}
input,select,button,textarea{width:100%;box-sizing:border-box;margin-top:5px;padding:9px;border-radius:7px;border:1px solid #2e6b43;background:#0d1e13;color:#e9fff0} button{background:var(--btn);border-color:#2ea44f;font-weight:800;cursor:pointer}.secondary{background:var(--btn2);border-color:#375b42}.danger{background:var(--danger);border-color:#9a2d2d}.activeAction{background:var(--yellow)!important;color:#111!important;border-color:#fff!important;box-shadow:0 0 12px var(--yellow)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.crosspad{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;align-items:center}.crosspad button{min-height:40px}
.status{font-size:12px;line-height:1.45;background:#07140d;border:1px solid #2e6b43;border-radius:8px;padding:8px;margin-top:8px;color:#c7ffd4}.small{font-size:12px;color:var(--muted);line-height:1.45} textarea{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;min-height:100px;resize:vertical}
.crosshair{position:absolute;left:50%;top:50%;width:30px;height:30px;margin-left:-15px;margin-top:-15px;z-index:700;pointer-events:none}.crosshair:before,.crosshair:after{content:"";position:absolute;background:#fff;box-shadow:0 0 3px #000}.crosshair:before{left:14px;top:0;width:2px;height:30px}.crosshair:after{left:0;top:14px;width:30px;height:2px}
.overlay-img{position:absolute;transform-origin:center center;pointer-events:none;z-index:350;will-change:transform,opacity}.marker-dot{width:24px;height:24px;border-radius:50%;background:#0d7d38;color:#fff;border:2px solid #baffc7;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;box-shadow:0 0 10px #000}.selected-dot{background:var(--yellow)!important;color:#111!important;border-color:#fff!important;box-shadow:0 0 14px var(--yellow)!important}
canvas{width:100%;height:260px;background:#071225;border:1px solid var(--line);border-radius:12px}.list{max-height:230px;overflow:auto;border:1px solid var(--line);border-radius:12px;background:#071225;padding:10px;font-size:12px;line-height:1.5;white-space:pre-wrap}.pill{display:inline-block;font-size:12px;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#102817;margin:6px 4px 0 0}.leaflet-control-layers,.leaflet-control-zoom{filter:invert(.85) hue-rotate(75deg)}
@media(max-width:900px){#app{grid-template-columns:1fr;grid-template-rows:auto 60vh}#left{height:55vh}.tabs{position:sticky;top:0;background:var(--panel);z-index:5}}
</style>
</head>
<body>
<div id="app">
<aside id="left">
<h1>GPX TOOL v6</h1>
<div class="tabs"><button class="tabbtn active" data-tab="mapTab">地圖標點</button><button class="tabbtn" data-tab="genTab">路徑生成</button><button class="tabbtn" data-tab="convTab">GPX轉換</button></div>

<section id="mapTab" class="view active">
<div class="box"><label>地圖中心座標</label><input id="centerInput" value="37.196446,36.577787" placeholder="lat,lng"><button id="goBtn">前往座標</button></div>
<div class="box"><label>截圖 Overlay</label><input id="fileInput" type="file" accept="image/*"><div id="drop" class="status">可拖放圖片，或複製截圖後貼上</div><label>透明度</label><input id="opacity" type="range" min="0.05" max="1" step="0.05" value="0.55"><div class="row"><button id="toggleOverlay" class="secondary">顯示/隱藏</button><button id="clearOverlay" class="danger">移除截圖</button></div><div class="status" id="imgStatus">尚未載入截圖</div></div>
<div class="box"><label>Overlay 精準校正</label><div class="crosspad"><div></div><button onclick="moveOverlay(0,1)">↑</button><div></div><button onclick="moveOverlay(-1,0)">←</button><button id="resetOverlay" class="secondary">置中</button><button onclick="moveOverlay(1,0)">→</button><div></div><button onclick="moveOverlay(0,-1)">↓</button><div></div></div><label>平移步距 / 公尺</label><select id="moveStep"><option value="0.25">0.25m</option><option value="0.5">0.5m</option><option value="1" selected>1m</option><option value="3">3m</option><option value="5">5m</option><option value="10">10m</option></select><div class="row"><button onclick="scaleOverlay(1.01)">放大1%</button><button onclick="scaleOverlay(0.99)">縮小1%</button></div><div class="row"><button onclick="rotateOverlay(-0.2)">左轉0.2°</button><button onclick="rotateOverlay(0.2)">右轉0.2°</button></div><div class="row"><button id="applyPikminPreset" class="secondary">Pikmin模板</button><button id="saveOverlayPreset" class="secondary">儲存校準</button></div><button id="loadOverlayPreset" class="secondary">載入校準</button><div class="status" id="overlayStatus">中心：--｜縮放：1.000｜旋轉：0°</div></div>
<div class="box"><label>標點</label><button id="addCenterBtn">十字中心加點</button><div class="row"><button id="toggleClickBtn" class="secondary">點擊加點 開/關</button><button id="undoBtn" class="secondary">復原</button></div><div class="row"><button id="clearBtn" class="danger">清除點位</button><button id="reverseBtn" class="secondary">反轉順序</button></div><div class="status" id="pointStatus">點位 0｜尚未標點</div></div>
<div class="box"><label>局部補正</label><div class="crosspad"><div></div><button onclick="offsetSelectedOrAll(0,1)">↑</button><div></div><button onclick="offsetSelectedOrAll(-1,0)">←</button><button id="toggleOffsetMode" class="secondary">全點補正</button><button onclick="offsetSelectedOrAll(1,0)">→</button><div></div><button onclick="offsetSelectedOrAll(0,-1)">↓</button><div></div></div><label>補正步距 / 公尺</label><select id="pointOffsetStep"><option value="0.25">0.25m</option><option value="0.5">0.5m</option><option value="1" selected>1m</option><option value="3">3m</option><option value="5">5m</option></select><div class="status" id="selectedStatus">目前選取：無</div></div>
<div class="box"><label>路徑最佳化</label><select id="optMode"><option value="none">維持目前順序</option><option value="shortest">最短路徑</option><option value="cycle">回到原點循環</option></select><label>起點座標，可留空</label><input id="startCoord" placeholder="lat,lng"><button id="optBtn">套用路徑最佳化</button></div>
<div class="box"><button id="sendToGenerator" class="secondary">把地圖點位送到「路徑生成」</button><label>條列座標</label><button id="copyCoordsBtn" class="secondary">複製座標</button><textarea id="coordsOut" rows="8"></textarea></div>
</section>

<section id="genTab" class="view">
<div class="box"><label>中心點座標</label><textarea id="genCoords" rows="9" placeholder="37.196446,36.577787\n37.196423,36.579930"></textarea><div class="row"><button id="importMapBtn" class="secondary">從地圖點位匯入</button><button id="copyGenCoordsBtn" class="secondary">複製中心點</button></div></div>
<div class="box"><label>生成設定</label><div class="row"><div><label>形狀</label><select id="shape"><option value="5">五邊形</option><option value="8">八邊形</option></select></div><div><label>路徑模式</label><select id="routeMode"><option value="shape">維持形狀路徑</option><option value="center">僅通過中心點</option></select></div></div><label>路徑方向</label><select id="pathDirection"><option value="forward">順向</option><option value="reverse">反向</option></select><div class="row3"><div><label>直徑(m)</label><input id="diameter" type="number" min="1" step="1" value="70"></div><div><label>基準角</label><input id="baseAngle" type="number" step="1" value="90"></div><div><label>重複刪除</label><select id="dedupe"><option value="yes">啟用</option><option value="no">停用</option></select></div></div><label>輸出檔名</label><input id="filename" type="text" value="waypoints"><label>GPX格式</label><select id="genFormat"><option value="standard">標準 Waypoint</option><option value="itools">iTools</option><option value="anyto">AnyTo</option></select><div class="row"><button id="generateBtn">生成</button><button id="downloadBtn" class="secondary">下載 GPX</button></div><div><span class="pill" id="statCenters">中心點 0</span><span class="pill" id="statUnique">唯一 0</span><span class="pill" id="statWpts">Waypoint 0</span></div><div id="genStatus" class="status">等待生成</div></div>
<div class="box"><label>預覽</label><canvas id="preview" width="900" height="500"></canvas><div class="list" id="routeList"></div></div>
<div class="box"><label>GPX輸出</label><button id="copyGenGpxBtn" class="secondary">複製GPX</button><textarea id="genGpxOut" rows="10"></textarea></div>
</section>

<section id="convTab" class="view">
<div class="box"><label>GPX轉換器</label><input type="file" id="convFileInput" multiple accept=".gpx,application/gpx+xml,text/xml"><button id="chooseConvBtn">選擇GPX檔</button><div class="row"><button id="runConvBtn">轉為Waypoint</button><button id="clearConvBtn" class="secondary">清除</button></div><div class="status" id="convStatus">等待檔案</div><textarea id="convLog" rows="12"></textarea></div>
</section>
</aside>
<main id="map"><div class="crosshair"></div></main>
</div>
<script>
const $=id=>document.getElementById(id);
document.querySelectorAll('.tabbtn').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.tabbtn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));btn.classList.add('active');$(btn.dataset.tab).classList.add('active');setTimeout(()=>map.invalidateSize(),50)}));
function parseCoord(s){const a=s.split(',').map(v=>Number(v.trim()));if(a.length!==2||a.some(v=>!Number.isFinite(v)))throw Error('座標格式需為 lat,lng');return L.latLng(a[0],a[1])}function f(n){return Number(n).toFixed(6)}function f8(n){return Number(n).toFixed(8)}function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&apos;'}[c]))}
async function copyText(text,statusId){try{if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(text)}else{const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');ta.remove()}if(statusId)$(statusId).textContent='已複製'}catch(e){const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');if(statusId)$(statusId).textContent='已複製'}catch(_){alert('複製失敗，請手動全選文字複製')}ta.remove()}}
const init=parseCoord($('centerInput').value);const map=L.map('map',{zoomControl:true}).setView(init,17);const layers={'OSM Standard':L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:20,attribution:'© OpenStreetMap'}),'Carto Light':L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',{maxZoom:20}),'Carto Dark':L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',{maxZoom:20})};layers['OSM Standard'].addTo(map);L.control.layers(layers,null,{collapsed:false,position:'topright'}).addTo(map);const overlayPane=map.createPane('precisionOverlay');overlayPane.style.zIndex=350;overlayPane.style.pointerEvents='none';
let points=[],markers=[],line=null,clickAdd=false,selectedIndex=-1,offsetAllMode=true;let overlayEl=null,overlayCenter=null,overlayScale=1,overlayRot=0,overlayVisible=true,imgW=0,imgH=0;
function updateOverlay(){if(!overlayEl||!overlayCenter)return;const p=map.latLngToLayerPoint(overlayCenter),s=.65*overlayScale;overlayEl.style.left=(p.x-imgW*s/2)+'px';overlayEl.style.top=(p.y-imgH*s/2)+'px';overlayEl.style.width=(imgW*s)+'px';overlayEl.style.height=(imgH*s)+'px';overlayEl.style.opacity=overlayVisible?$('opacity').value:0;overlayEl.style.transform=`rotate(${overlayRot}deg)`;$('overlayStatus').textContent=`中心：${f(overlayCenter.lat)},${f(overlayCenter.lng)}｜縮放：${overlayScale.toFixed(3)}｜旋轉：${overlayRot.toFixed(1)}°`}
function createOverlay(url,w,h){if(overlayEl)overlayEl.remove();imgW=w;imgH=h;overlayCenter=map.getCenter();overlayScale=1;overlayRot=0;overlayVisible=true;overlayEl=document.createElement('img');overlayEl.src=url;overlayEl.className='overlay-img';overlayPane.appendChild(overlayEl);updateOverlay();$('imgStatus').textContent=`已載入截圖 ${w}×${h}`}
function loadFile(file){if(!file||!file.type.startsWith('image/')){alert('請提供圖片');return}const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>createOverlay(e.target.result,img.width,img.height);img.src=e.target.result};r.readAsDataURL(file)}$('fileInput').onchange=e=>loadFile(e.target.files[0]);$('drop').ondragover=e=>e.preventDefault();$('drop').ondrop=e=>{e.preventDefault();loadFile(e.dataTransfer.files[0])};document.addEventListener('paste',e=>{for(const it of e.clipboardData.items){if(it.type.startsWith('image/')){loadFile(it.getAsFile());e.preventDefault();return}}});$('opacity').oninput=updateOverlay;$('toggleOverlay').onclick=()=>{overlayVisible=!overlayVisible;updateOverlay()};$('clearOverlay').onclick=()=>{if(overlayEl)overlayEl.remove();overlayEl=null;overlayCenter=null;$('imgStatus').textContent='尚未載入截圖';$('overlayStatus').textContent='中心：--｜縮放：1.000｜旋轉：0°'};$('resetOverlay').onclick=()=>{if(!overlayEl)return;overlayCenter=map.getCenter();overlayScale=1;overlayRot=0;updateOverlay()};
function destination(latlng,meters,bearingDeg){const R=6378137,br=bearingDeg*Math.PI/180,lat1=latlng.lat*Math.PI/180,lon1=latlng.lng*Math.PI/180,d=meters/R;const lat2=Math.asin(Math.sin(lat1)*Math.cos(d)+Math.cos(lat1)*Math.sin(d)*Math.cos(br));const lon2=lon1+Math.atan2(Math.sin(br)*Math.sin(d)*Math.cos(lat1),Math.cos(d)-Math.sin(lat1)*Math.sin(lat2));return L.latLng(lat2*180/Math.PI,lon2*180/Math.PI)}function moveOverlay(x,y){if(!overlayCenter)return;const step=Number($('moveStep').value)||1;if(y>0)overlayCenter=destination(overlayCenter,step,0);if(y<0)overlayCenter=destination(overlayCenter,step,180);if(x>0)overlayCenter=destination(overlayCenter,step,90);if(x<0)overlayCenter=destination(overlayCenter,step,270);updateOverlay()}function scaleOverlay(fac){if(!overlayEl)return;overlayScale*=fac;updateOverlay()}function rotateOverlay(deg){if(!overlayEl)return;overlayRot+=deg;updateOverlay()}map.on('zoom move viewreset',updateOverlay);
$('applyPikminPreset').onclick=()=>{if(!overlayEl||!overlayCenter){alert('請先載入截圖');return}overlayRot=-1.25;overlayScale*=1.0042;overlayCenter=destination(destination(overlayCenter,5.8,90),4.2,0);updateOverlay()};$('saveOverlayPreset').onclick=()=>{if(!overlayCenter){alert('請先載入截圖');return}localStorage.setItem('pikminOverlayPreset',JSON.stringify({lat:overlayCenter.lat,lng:overlayCenter.lng,scale:overlayScale,rot:overlayRot,opacity:$('opacity').value}));alert('已儲存')};$('loadOverlayPreset').onclick=()=>{const raw=localStorage.getItem('pikminOverlayPreset');if(!raw||!overlayEl){alert('請先載入截圖，並確認已有儲存校準');return}const p=JSON.parse(raw);overlayCenter=L.latLng(p.lat,p.lng);overlayScale=p.scale;overlayRot=p.rot;$('opacity').value=p.opacity||$('opacity').value;updateOverlay()};
function icon(i,sel=false){return L.divIcon({className:'',html:`<div class="marker-dot ${sel?'selected-dot':''}">${i}</div>`,iconSize:[24,24],iconAnchor:[12,12]})}function refresh(){markers.forEach(m=>m.remove());markers=[];if(line)line.remove();points.forEach((p,i)=>{const m=L.marker([p.lat,p.lng],{icon:icon(i+1,i===selectedIndex),draggable:true}).addTo(map);m.on('click',()=>{selectedIndex=selectedIndex===i?-1:i;refresh()});m.on('dragend',e=>{const ll=e.target.getLatLng();p.lat=ll.lat;p.lng=ll.lng;refresh()});m.on('contextmenu',()=>{points.splice(i,1);if(selectedIndex===i)selectedIndex=-1;refresh()});markers.push(m)});if(points.length>1)line=L.polyline(points.map(p=>[p.lat,p.lng]),{color:'#00ff66',weight:3,opacity:.85}).addTo(map);$('pointStatus').textContent=`點位 ${points.length}｜${clickAdd?'標點中':'尚未標點'}`;$('selectedStatus').textContent=`目前選取：${selectedIndex>=0?selectedIndex+1:'無'}｜${offsetAllMode?'全點補正':'單點補正'}`;$('coordsOut').value=points.map(p=>`${f(p.lat)},${f(p.lng)}`).join('\n')}
function addPoint(ll){points.push({lat:ll.lat,lng:ll.lng});refresh()}$('goBtn').onclick=()=>{try{map.setView(parseCoord($('centerInput').value),17)}catch(e){alert(e.message)}};$('addCenterBtn').onclick=()=>addPoint(map.getCenter());$('toggleClickBtn').onclick=()=>{clickAdd=!clickAdd;$('toggleClickBtn').classList.toggle('activeAction',clickAdd);refresh()};map.on('click',e=>{if(clickAdd)addPoint(e.latlng)});$('undoBtn').onclick=()=>{points.pop();refresh()};$('clearBtn').onclick=()=>{if(confirm('確定清除全部點位？')){points=[];selectedIndex=-1;refresh();}};$('reverseBtn').onclick=()=>{points.reverse();refresh()};$('copyCoordsBtn').onclick=()=>copyText($('coordsOut').value,'pointStatus');
$('toggleOffsetMode').onclick=()=>{offsetAllMode=!offsetAllMode;$('toggleOffsetMode').textContent=offsetAllMode?'全點補正':'單點補正';refresh()};function offsetSelectedOrAll(x,y){const step=Number($('pointOffsetStep').value)||1;const mv=p=>{let ll=L.latLng(p.lat,p.lng);if(y>0)ll=destination(ll,step,0);if(y<0)ll=destination(ll,step,180);if(x>0)ll=destination(ll,step,90);if(x<0)ll=destination(ll,step,270);p.lat=ll.lat;p.lng=ll.lng};if(offsetAllMode)points.forEach(mv);else{if(selectedIndex<0||!points[selectedIndex]){alert('請先點選一個點位');return}mv(points[selectedIndex])}refresh()}
function dist(a,b){const R=6371000,p1=a.lat*Math.PI/180,p2=b.lat*Math.PI/180,dp=(b.lat-a.lat)*Math.PI/180,dl=(b.lng-a.lng)*Math.PI/180,h=Math.sin(dp/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;return 2*R*Math.atan2(Math.sqrt(h),Math.sqrt(1-h))}function nearest(arr,start){if(!arr.length)return[];const rem=arr.slice(),out=[];let cur=start||rem.shift();if(!start)out.push(cur);while(rem.length){let bi=0,bd=1e99;rem.forEach((p,i)=>{const d=dist(cur,p);if(d<bd){bd=d;bi=i}});cur=rem.splice(bi,1)[0];out.push(cur)}return out}function routeLen(arr){let s=0;for(let i=0;i<arr.length-1;i++)s+=dist(arr[i],arr[i+1]);return s}function twoOpt(arr){let best=arr.slice(),improved=true,guard=0;while(improved&&guard++<80){improved=false;for(let i=1;i<best.length-2;i++)for(let k=i+1;k<best.length-1;k++){const n=best.slice(0,i).concat(best.slice(i,k+1).reverse(),best.slice(k+1));if(routeLen(n)+.01<routeLen(best)){best=n;improved=true}}}return best}$('optBtn').onclick=()=>{if(points.length<2)return;let start=null;try{if($('startCoord').value.trim())start=parseCoord($('startCoord').value)}catch(e){alert(e.message);return}if($('optMode').value==='shortest')points=twoOpt(nearest(points,start));if($('optMode').value==='cycle')points=twoOpt(nearest(points,start));refresh()};$('sendToGenerator').onclick=()=>{sendMapToGenerator();document.querySelector('[data-tab="genTab"]').click()};$('importMapBtn').onclick=sendMapToGenerator;function sendMapToGenerator(){$('genCoords').value=points.map(p=>`${f(p.lat)},${f(p.lng)}`).join('\n')}
// Generator logic from editor
const R=6371000;let latest={centers:[],uniqueCenters:[],exportWpts:[],gpx:'',routeLines:[]};function parseInput(text){return text.split(/\n+/).map(s=>s.trim()).filter(Boolean).map((line,idx)=>{const m=line.match(/(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)/);if(!m)return{error:`第 ${idx+1} 行格式錯誤`};return{lat:parseFloat(m[1]),lon:parseFloat(m[2]),raw:line}})}function dedupeCenters(points){const seen=new Set(),out=[];for(const p of points){const key=`${p.lat.toFixed(7)},${p.lon.toFixed(7)}`;if(!seen.has(key)){seen.add(key);out.push(p)}}return out}function hav(a,b){return dist({lat:a.lat,lng:a.lon??a.lng},{lat:b.lat,lng:b.lon??b.lng})}function movePoint(lat,lon,bearingDeg,distM){const ll=destination(L.latLng(lat,lon),distM,bearingDeg);return{lat:ll.lat,lon:ll.lng}}function bearingDeg(a,b){const aa={lat:a.lat,lng:a.lon??a.lng},bb={lat:b.lat,lng:b.lon??b.lng};const y=Math.sin((bb.lng-aa.lng)*Math.PI/180)*Math.cos(bb.lat*Math.PI/180),x=Math.cos(aa.lat*Math.PI/180)*Math.sin(bb.lat*Math.PI/180)-Math.sin(aa.lat*Math.PI/180)*Math.cos(bb.lat*Math.PI/180)*Math.cos((bb.lng-aa.lng)*Math.PI/180);return(Math.atan2(y,x)*180/Math.PI+360)%360}function angleDiff(a,b){return Math.abs(((a-b+540)%360)-180)}function generateRegular(center,sides,radiusM,baseAngle){const pts=[],step=360/sides;for(let i=0;i<sides;i++){const ang=(baseAngle+i*step)%360;pts.push({...movePoint(center.lat,center.lon,ang,radiusM),angle:ang})}return pts}function nearestNeighborOrder(points){return nearest(points.map(p=>({lat:p.lat,lng:p.lon,lon:p.lon,raw:p.raw}))).map(p=>({lat:p.lat,lon:p.lng,raw:p.raw}))}function rotateToBestTransition(shapePts,prevCenter,nextCenter,center,baseAngle){const n=shapePts.length;let best=null;for(let start=0;start<n;start++){const cw=[],ccw=[];for(let i=0;i<n;i++)cw.push(shapePts[(start+i)%n]);for(let i=0;i<n;i++)ccw.push(shapePts[(start-i+n)%n]);for(const seq of [cw,ccw]){const entry=seq[0],exit=seq[seq.length-1];let score=0;if(prevCenter){score+=hav(prevCenter,entry);score+=angleDiff(entry.angle,bearingDeg(center,prevCenter))*0.15}else score+=angleDiff(entry.angle,baseAngle)*0.15;if(nextCenter){score+=hav(exit,nextCenter);score+=angleDiff(exit.angle,bearingDeg(center,nextCenter))*0.15}let pathLen=0;for(let i=1;i<seq.length;i++)pathLen+=hav(seq[i-1],seq[i]);score+=pathLen*0.01;if(!best||score<best.score)best={seq,score}}}return best.seq}function buildRoute(centers,sides,diameter,baseAngle,routeMode){const radius=diameter/2,orderedCenters=nearestNeighborOrder(centers),exportWpts=[],routeLines=[];for(let i=0;i<orderedCenters.length;i++){const c=orderedCenters[i],prevCenter=i>0?orderedCenters[i-1]:null,nextCenter=i<orderedCenters.length-1?orderedCenters[i+1]:null;if(routeMode==='center'){exportWpts.push({lat:c.lat,lon:c.lon,name:`C${i+1}`});if(nextCenter)routeLines.push([{lat:c.lat,lon:c.lon},{lat:nextCenter.lat,lon:nextCenter.lon}]);continue}const raw=generateRegular(c,sides,radius,baseAngle),seq=rotateToBestTransition(raw,prevCenter,nextCenter,c,baseAngle);for(let j=0;j<seq.length;j++){exportWpts.push({lat:seq[j].lat,lon:seq[j].lon,name:`C${i+1}_WP${j+1}`});if(j>0)routeLines.push([{lat:seq[j-1].lat,lon:seq[j-1].lon},{lat:seq[j].lat,lon:seq[j].lon}])}exportWpts.push({lat:seq[0].lat,lon:seq[0].lon,name:`C${i+1}_WP${seq.length+1}`});routeLines.push([{lat:seq[seq.length-1].lat,lon:seq[seq.length-1].lon},{lat:seq[0].lat,lon:seq[0].lon}]);if(nextCenter)routeLines.push([{lat:seq[seq.length-1].lat,lon:seq[seq.length-1].lon},{lat:nextCenter.lat,lon:nextCenter.lon}])}return{orderedCenters,exportWpts,routeLines}}function buildSequentialLines(wpts){const lines=[];for(let i=0;i<wpts.length-1;i++)lines.push([{lat:wpts[i].lat,lon:wpts[i].lon},{lat:wpts[i+1].lat,lon:wpts[i+1].lon}]);return lines}function buildGenGpx(wpts,format){const creator=format==='itools'?'iTools':format==='anyto'?'AnyTo':'ARMate';const items=wpts.map((p,i)=>`  <wpt lat="${f8(p.lat)}" lon="${f8(p.lon)}">\n    <time>${new Date(Date.UTC(2026,0,1,0,0,Math.min(i,59))).toISOString()}</time>\n    <name>${esc(format==='itools'?'iTools_'+(i+1):format==='anyto'?'AnyTo_'+(i+1):p.name)}</name>\n  </wpt>`).join('\n');return`<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="${creator}" xmlns="http://www.topografix.com/GPX/1/1">\n${items}\n</gpx>\n`}
function drawPreview(latest){const canvas=$('preview'),ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;ctx.clearRect(0,0,W,H);ctx.fillStyle='#071225';ctx.fillRect(0,0,W,H);const all=[...latest.uniqueCenters,...latest.exportWpts];if(!all.length){ctx.fillStyle='#9fb0de';ctx.font='16px system-ui';ctx.fillText('尚未生成路徑',30,40);return}let minLat=Infinity,maxLat=-Infinity,minLon=Infinity,maxLon=-Infinity;all.forEach(p=>{minLat=Math.min(minLat,p.lat);maxLat=Math.max(maxLat,p.lat);minLon=Math.min(minLon,p.lon);maxLon=Math.max(maxLon,p.lon)});const pad=40,lonSpan=Math.max(maxLon-minLon,.0002),latSpan=Math.max(maxLat-minLat,.0002),scale=Math.min((W-pad*2)/lonSpan,(H-pad*2)/latSpan);const proj=p=>({x:pad+(p.lon-minLon)*scale,y:H-(pad+(p.lat-minLat)*scale)});ctx.strokeStyle='#6ea8fe';ctx.lineWidth=2.2;latest.routeLines.forEach(seg=>{const a=proj(seg[0]),b=proj(seg[1]);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()});latest.exportWpts.forEach((p,i)=>{const q=proj(p);ctx.fillStyle='#7ee787';ctx.beginPath();ctx.arc(q.x,q.y,3.5,0,Math.PI*2);ctx.fill();if(i<150){ctx.fillStyle='#dfe7ff';ctx.font='11px system-ui';ctx.fillText(String(i+1),q.x+5,q.y-5)}});latest.uniqueCenters.forEach((p,i)=>{const q=proj(p);ctx.fillStyle='#ffcc66';ctx.beginPath();ctx.arc(q.x,q.y,5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff4d0';ctx.font='bold 12px system-ui';ctx.fillText(`C${i+1}`,q.x+7,q.y+4)})}function updateList(){const lines=[];latest.uniqueCenters.forEach(c=>lines.push(`${f(c.lat)},${f(c.lon)}`));lines.push('');latest.exportWpts.slice(0,300).forEach(p=>lines.push(`${f8(p.lat)},${f8(p.lon)}`));if(latest.exportWpts.length>300)lines.push(`... 共 ${latest.exportWpts.length} 個 waypoint`);$('routeList').textContent=lines.join('\n')}
function generate(){const parsed=parseInput($('genCoords').value),errors=parsed.filter(x=>x.error);if(errors.length){$('genStatus').textContent=errors[0].error;return}const centers0=parsed,unique=$('dedupe').value==='yes'?dedupeCenters(centers0):centers0.slice(),sides=parseInt($('shape').value,10),diameter=parseFloat($('diameter').value||'70'),baseAngle=parseFloat($('baseAngle').value||'90'),routeMode=$('routeMode').value;let built=buildRoute(unique,sides,diameter,baseAngle,routeMode);if($('pathDirection')&&$('pathDirection').value==='reverse'){built={orderedCenters:built.orderedCenters.slice().reverse(),exportWpts:built.exportWpts.slice().reverse(),routeLines:buildSequentialLines(built.exportWpts.slice().reverse())};}const gpx=buildGenGpx(built.exportWpts,$('genFormat').value);latest={centers:centers0,uniqueCenters:built.orderedCenters,exportWpts:built.exportWpts,gpx,routeLines:built.routeLines};$('statCenters').textContent=`中心點 ${centers0.length}`;$('statUnique').textContent=`唯一 ${unique.length}`;$('statWpts').textContent=`Waypoint ${built.exportWpts.length}`;$('genStatus').textContent='已生成';$('genGpxOut').value=gpx;updateList();drawPreview(latest)}function downloadGpx(){if(!latest.gpx)generate();if(!latest.gpx)return;let name=($('filename').value||'waypoints').replace(/[\\/:*?"<>|]/g,'_');if(!name.toLowerCase().endsWith('.gpx'))name+='.gpx';const blob=new Blob([latest.gpx],{type:'application/gpx+xml;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}$('generateBtn').onclick=generate;$('downloadBtn').onclick=downloadGpx;$('copyGenCoordsBtn').onclick=()=>copyText($('genCoords').value,'genStatus');$('copyGenGpxBtn').onclick=()=>copyText($('genGpxOut').value,'genStatus');drawPreview(latest);
// Converter
let convFiles=[];$('chooseConvBtn').onclick=()=>$('convFileInput').click();$('convFileInput').onchange=e=>{convFiles=[...e.target.files];$('convStatus').textContent=`已載入 ${convFiles.length} 個檔案`};$('clearConvBtn').onclick=()=>{convFiles=[];$('convFileInput').value='';$('convLog').value='';$('convStatus').textContent='等待檔案'};function readFile(file){return new Promise((resolve,reject)=>{const fr=new FileReader();fr.onload=()=>resolve(fr.result);fr.onerror=()=>reject(new Error('讀取失敗'));fr.readAsText(file)})}function extractGpxPoints(text){const raw=String(text).replace(/(<\/?)(\w+):/g,'$1');const pts=[];for(const tag of ['rtept','trkpt','wpt']){const re=new RegExp('<'+tag+'\\b[^>]*\\blat="([^"]+)"[^>]*\\blon="([^"]+)"[^>]*\\/?>','gi');let m;while((m=re.exec(raw))!==null){const lat=parseFloat(m[1]),lon=parseFloat(m[2]);if(Number.isFinite(lat)&&Number.isFinite(lon))pts.push({lat,lon})}if(pts.length)break}return pts}function buildWaypointGpx(points){return '<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="GPX Tool v6 Converter" xmlns="http://www.topografix.com/GPX/1/1">\n'+points.map((p,i)=>`  <wpt lat="${f8(p.lat)}" lon="${f8(p.lon)}"><name>P${i+1}</name></wpt>`).join('\n')+'\n</gpx>\n'}function downloadText(name,text){const blob=new Blob([text],{type:'application/gpx+xml;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click()}$('runConvBtn').onclick=async()=>{if(!convFiles.length){$('convStatus').textContent='請先選檔';return}let log=[];for(const file of convFiles){try{const text=await readFile(file),pts=extractGpxPoints(text);if(!pts.length)throw new Error('沒有座標');downloadText(file.name.replace(/\.gpx$/i,'')+'_waypoint.gpx',buildWaypointGpx(pts));log.push(`${file.name} → ${pts.length} waypoint ✔`)}catch(e){log.push(`${file.name} ✖ ${e.message}`)}}$('convLog').value=log.join('\n');$('convStatus').textContent='完成'};
