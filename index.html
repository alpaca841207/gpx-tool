<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Final GPX Tool v2</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
html,body{height:100%;margin:0;background:#07140d;color:#d8ffe0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
#app{height:100%;display:grid;grid-template-columns:390px 1fr}#left{background:#06140b;border-right:1px solid #1e5b35;padding:12px;overflow:auto}#map{height:100%;background:#111}
h1{font-size:16px;margin:0 0 10px;color:#7dff9a;letter-spacing:.08em}.box{border:1px solid #245d39;border-radius:10px;background:#0b2012;padding:10px;margin-bottom:10px}
label{display:block;font-size:13px;color:#a7d7b2;margin-top:8px}input,select,button,textarea{width:100%;box-sizing:border-box;margin-top:5px;padding:9px;border-radius:7px;border:1px solid #2e6b43;background:#0d1e13;color:#e9fff0}
button{background:#136b32;border-color:#2ea44f;font-weight:700;cursor:pointer}.secondary{background:#17291d;border-color:#375b42}.danger{background:#5b1616;border-color:#9a2d2d}.active{background:#ffd400!important;color:#111!important;border-color:#fff!important;box-shadow:0 0 12px #ffd400}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.crosspad{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;align-items:center}.crosspad button{min-height:40px}
.status{font-size:12px;line-height:1.45;background:#07140d;border:1px solid #2e6b43;border-radius:8px;padding:8px;margin-top:8px;color:#c7ffd4}textarea{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px}
.crosshair{position:absolute;left:50%;top:50%;width:30px;height:30px;margin-left:-15px;margin-top:-15px;z-index:700;pointer-events:none}.crosshair:before,.crosshair:after{content:"";position:absolute;background:#fff;box-shadow:0 0 3px #000}.crosshair:before{left:14px;top:0;width:2px;height:30px}.crosshair:after{left:0;top:14px;width:30px;height:2px}
.overlay-img{position:absolute;transform-origin:center center;pointer-events:none;z-index:350;will-change:transform,opacity}.marker-dot{width:24px;height:24px;border-radius:50%;background:#0d7d38;color:#fff;border:2px solid #baffc7;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;box-shadow:0 0 10px #000}.small{font-size:12px;color:#9bcda6;line-height:1.45}.leaflet-control-layers,.leaflet-control-zoom{filter:invert(.85) hue-rotate(75deg)}
</style></head><body><div id="app"><aside id="left"><h1>FINAL GPX TOOL v2</h1>
<div class="box"><label>地圖中心座標</label><input id="centerInput" value="37.196446,36.577787" placeholder="lat,lng"><button id="goBtn">前往座標</button></div>
<div class="box"><label>截圖 Overlay</label><input id="fileInput" type="file" accept="image/*"><div id="drop" class="status">可拖放圖片，或複製截圖後貼上</div><label>透明度</label><input id="opacity" type="range" min="0.05" max="1" step="0.05" value="0.55"><div class="row"><button id="toggleOverlay" class="secondary">顯示/隱藏</button><button id="clearOverlay" class="danger">移除截圖</button></div><div class="status" id="imgStatus">尚未載入截圖</div></div>
<div class="box"><label>Overlay 精準校正</label><div class="crosspad"><div></div><button onclick="moveOverlay(0,1)">↑</button><div></div><button onclick="moveOverlay(-1,0)">←</button><button id="resetOverlay" class="secondary">置中</button><button onclick="moveOverlay(1,0)">→</button><div></div><button onclick="moveOverlay(0,-1)">↓</button><div></div></div><label>平移步距 / 公尺</label><select id="moveStep"><option value="0.25">0.25m</option><option value="0.5">0.5m</option><option value="1" selected>1m</option><option value="3">3m</option><option value="5">5m</option><option value="10">10m</option></select><div class="row"><button onclick="scaleOverlay(1.002)">放大0.2%</button><button onclick="scaleOverlay(0.998)">縮小0.2%</button></div><div class="row"><button onclick="rotateOverlay(-0.2)">左轉0.2°</button><button onclick="rotateOverlay(0.2)">右轉0.2°</button></div><div class="row"><button onclick="rotateOverlay(-1)" class="secondary">左轉1°</button><button onclick="rotateOverlay(1)" class="secondary">右轉1°</button></div><div class="status" id="overlayStatus">中心：--｜縮放：1.000｜旋轉：0°</div></div>
<div class="box"><label>標點</label><button id="addCenterBtn">十字中心加點</button><div class="row"><button id="toggleClickBtn" class="secondary">點擊加點 開/關</button><button id="undoBtn" class="secondary">復原</button></div><div class="row"><button id="clearBtn" class="danger">清除點位</button><button id="reverseBtn" class="secondary">反轉順序</button></div><div class="status" id="pointStatus">點位 0｜尚未標點</div></div>
<div class="box"><label>路徑最佳化</label><select id="optMode"><option value="none">維持目前順序</option><option value="shortest">最短路徑</option><option value="cycle">回到原點循環</option></select><label>起點座標，可留空</label><input id="startCoord" placeholder="lat,lng"><button id="optBtn">套用路徑最佳化</button></div>
<div class="box"><label>GPX 生成</label><input id="fileName" value="route"><label>GPX版本</label><select id="gpxFormat"><option value="standard">標準 GPX</option><option value="itools">iTools GPX</option><option value="anyto">AnyTo GPX</option></select><label>GPX 類型</label><select id="gpxType"><option value="wpt" selected>Waypoint</option><option value="rte">Route</option><option value="trk">Track</option><option value="both">Waypoint + Route</option></select><label>反向路徑</label><select id="returnMode"><option value="off">單向</option><option value="back">逆行回去</option></select><label>Waypoint 形狀</label><select id="shapeMode"><option value="center">中心點</option><option value="pentagon">五邊形繞點</option><option value="octagon">八邊形繞點</option></select><label>繞點半徑/m</label><input id="radiusM" type="number" value="20"><div class="row"><button id="makeGpxBtn">生成 GPX</button><button id="downloadGpxBtn" class="secondary">下載所選GPX</button></div><div class="row"><button id="downloadItoolsBtn" class="secondary">下載 iTools</button><button id="downloadAnytoBtn" class="secondary">下載 AnyTo</button></div></div>
<div class="box"><label>條列座標</label><button id="copyCoordsBtn" class="secondary">複製座標</button><textarea id="coordsOut" rows="8"></textarea><label>GPX</label><button id="copyGpxBtn" class="secondary">複製 GPX</button><textarea id="gpxOut" rows="10"></textarea><div class="status" id="gpxStatus">尚未生成 GPX</div></div>
<div class="box small">更新：移除縮放層級、地圖中心十字加點、偏移補償、點位群組。標點中以黃色高亮提示。路徑含最短路徑與回原點循環。</div>
</aside><main id="map"><div class="crosshair"></div></main></div>
<script>
const $=id=>document.getElementById(id);let points=[],markers=[],line=null,clickAdd=false;let overlayEl=null,overlayCenter=null,overlayScale=1,overlayRot=0,overlayVisible=true,imgW=0,imgH=0;
function parseCoord(s){const a=s.split(',').map(v=>Number(v.trim()));if(a.length!==2||a.some(v=>!Number.isFinite(v)))throw Error('座標格式需為 lat,lng');return L.latLng(a[0],a[1]);}
function f(n){return Number(n).toFixed(6)}function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&apos;'}[c]))}
const init=parseCoord($('centerInput').value);const map=L.map('map',{zoomControl:true}).setView(init,17);const layers={'OSM Standard':L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:20,attribution:'© OpenStreetMap'}),'Carto Light':L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',{maxZoom:20}),'Carto Dark':L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',{maxZoom:20})};layers['OSM Standard'].addTo(map);L.control.layers(layers,null,{collapsed:false,position:'topright'}).addTo(map);const overlayPane=map.createPane('precisionOverlay');overlayPane.style.zIndex=350;overlayPane.style.pointerEvents='none';
function updateOverlay(){if(!overlayEl||!overlayCenter)return;const p=map.latLngToLayerPoint(overlayCenter),base=.65,s=base*overlayScale;overlayEl.style.left=(p.x-imgW*s/2)+'px';overlayEl.style.top=(p.y-imgH*s/2)+'px';overlayEl.style.width=(imgW*s)+'px';overlayEl.style.height=(imgH*s)+'px';overlayEl.style.opacity=overlayVisible?$('opacity').value:0;overlayEl.style.transform=`rotate(${overlayRot}deg)`;$('overlayStatus').textContent=`中心：${f(overlayCenter.lat)},${f(overlayCenter.lng)}｜縮放：${overlayScale.toFixed(3)}｜旋轉：${overlayRot.toFixed(1)}°`}
function createOverlay(url,w,h){if(overlayEl)overlayEl.remove();imgW=w;imgH=h;overlayCenter=map.getCenter();overlayScale=1;overlayRot=0;overlayVisible=true;overlayEl=document.createElement('img');overlayEl.src=url;overlayEl.className='overlay-img';overlayPane.appendChild(overlayEl);updateOverlay();$('imgStatus').textContent=`已載入截圖 ${w}×${h}`}
function loadFile(file){if(!file||!file.type.startsWith('image/')){alert('請提供圖片');return}const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>createOverlay(e.target.result,img.width,img.height);img.src=e.target.result};r.readAsDataURL(file)}
$('fileInput').onchange=e=>loadFile(e.target.files[0]);$('drop').ondragover=e=>e.preventDefault();$('drop').ondrop=e=>{e.preventDefault();loadFile(e.dataTransfer.files[0])};document.addEventListener('paste',e=>{for(const it of e.clipboardData.items){if(it.type.startsWith('image/')){loadFile(it.getAsFile());e.preventDefault();return}}});$('opacity').oninput=updateOverlay;$('toggleOverlay').onclick=()=>{overlayVisible=!overlayVisible;updateOverlay()};$('clearOverlay').onclick=()=>{if(overlayEl)overlayEl.remove();overlayEl=null;overlayCenter=null;$('imgStatus').textContent='尚未載入截圖';$('overlayStatus').textContent='中心：--｜縮放：1.000｜旋轉：0°'};$('resetOverlay').onclick=()=>{if(!overlayEl)return;overlayCenter=map.getCenter();overlayScale=1;overlayRot=0;updateOverlay()};
function destination(latlng,meters,bearingDeg){const R=6378137,br=bearingDeg*Math.PI/180,lat1=latlng.lat*Math.PI/180,lon1=latlng.lng*Math.PI/180,d=meters/R;const lat2=Math.asin(Math.sin(lat1)*Math.cos(d)+Math.cos(lat1)*Math.sin(d)*Math.cos(br));const lon2=lon1+Math.atan2(Math.sin(br)*Math.sin(d)*Math.cos(lat1),Math.cos(d)-Math.sin(lat1)*Math.sin(lat2));return L.latLng(lat2*180/Math.PI,lon2*180/Math.PI)}
function moveOverlay(x,y){if(!overlayCenter)return;const step=Number($('moveStep').value)||1;if(y>0)overlayCenter=destination(overlayCenter,step,0);if(y<0)overlayCenter=destination(overlayCenter,step,180);if(x>0)overlayCenter=destination(overlayCenter,step,90);if(x<0)overlayCenter=destination(overlayCenter,step,270);updateOverlay()}function scaleOverlay(fac){if(!overlayEl)return;overlayScale*=fac;updateOverlay()}function rotateOverlay(deg){if(!overlayEl)return;overlayRot+=deg;updateOverlay()}map.on('zoom move viewreset',updateOverlay);
function icon(i){return L.divIcon({className:'',html:`<div class="marker-dot">${i}</div>`,iconSize:[24,24],iconAnchor:[12,12]})}
function refresh(){markers.forEach(m=>m.remove());markers=[];if(line)line.remove();points.forEach((p,i)=>{const m=L.marker([p.lat,p.lng],{icon:icon(i+1),draggable:true}).addTo(map);m.on('dragend',e=>{const ll=e.target.getLatLng();p.lat=ll.lat;p.lng=ll.lng;refresh()});m.on('contextmenu',()=>{points.splice(i,1);refresh()});markers.push(m)});if(points.length>1)line=L.polyline(points.map(p=>[p.lat,p.lng]),{color:'#00ff66',weight:3,opacity:.85}).addTo(map);$('pointStatus').textContent=`點位 ${points.length}｜${clickAdd?'標點中':'尚未標點'}`;$('coordsOut').value=points.map((p,i)=>`${i+1}. ${f(p.lat)},${f(p.lng)}`).join('\\n')}
function addPoint(ll){points.push({lat:ll.lat,lng:ll.lng});refresh()}$('goBtn').onclick=()=>{try{map.setView(parseCoord($('centerInput').value),17)}catch(e){alert(e.message)}};$('addCenterBtn').onclick=()=>addPoint(map.getCenter());$('toggleClickBtn').onclick=()=>{clickAdd=!clickAdd;$('toggleClickBtn').classList.toggle('active',clickAdd);refresh()};map.on('click',e=>{if(clickAdd)addPoint(e.latlng)});$('undoBtn').onclick=()=>{points.pop();refresh()};$('clearBtn').onclick=()=>{if(confirm('確定清除全部點位？')){points=[];refresh();$('gpxOut').value=''}};$('reverseBtn').onclick=()=>{points.reverse();refresh()};
function dist(a,b){const R=6371000,p1=a.lat*Math.PI/180,p2=b.lat*Math.PI/180,dp=(b.lat-a.lat)*Math.PI/180,dl=(b.lng-a.lng)*Math.PI/180,h=Math.sin(dp/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;return 2*R*Math.atan2(Math.sqrt(h),Math.sqrt(1-h))}
function nearest(arr,start){if(!arr.length)return[];const rem=arr.slice(),out=[];let cur=start||rem.shift();if(!start)out.push(cur);while(rem.length){let bi=0,bd=1e99;rem.forEach((p,i)=>{const d=dist(cur,p);if(d<bd){bd=d;bi=i}});cur=rem.splice(bi,1)[0];out.push(cur)}return out}
function routeLen(arr){let s=0;for(let i=0;i<arr.length-1;i++)s+=dist(arr[i],arr[i+1]);return s}
function twoOpt(arr){let best=arr.slice(),improved=true,guard=0;while(improved&&guard++<80){improved=false;for(let i=1;i<best.length-2;i++)for(let k=i+1;k<best.length-1;k++){const n=best.slice(0,i).concat(best.slice(i,k+1).reverse(),best.slice(k+1));if(routeLen(n)+.01<routeLen(best)){best=n;improved=true}}}return best}
$('optBtn').onclick=()=>{if(points.length<2)return;let start=null;try{if($('startCoord').value.trim())start=parseCoord($('startCoord').value)}catch(e){alert(e.message);return}if($('optMode').value==='shortest')points=twoOpt(nearest(points,start));if($('optMode').value==='cycle'){let cy=twoOpt(nearest(points,start));points=cy}refresh()};
function bearing(a,b){const y=Math.sin((b.lng-a.lng)*Math.PI/180)*Math.cos(b.lat*Math.PI/180),x=Math.cos(a.lat*Math.PI/180)*Math.sin(b.lat*Math.PI/180)-Math.sin(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.cos((b.lng-a.lng)*Math.PI/180);return(Math.atan2(y,x)*180/Math.PI+360)%360}
function offset(p,m,deg){const ll=destination(L.latLng(p.lat,p.lng),m,deg);return{lat:ll.lat,lng:ll.lng}}
function expandShape(arr){const mode=$('shapeMode').value,r=Number($('radiusM').value)||0,out=[];arr.forEach((p,i)=>{const nb=arr[i+1]||arr[i-1]||p,br=Math.round(bearing(p,nb)/90)*90;if(mode==='center')out.push(p);else{const n=mode==='pentagon'?5:8;for(let k=0;k<n;k++)out.push(offset(p,r,br+k*360/n))}});return out}
function routePoints(){let base=points.slice();if($('optMode').value==='cycle'&&base.length>1)base=base.concat([base[0]]);if($('returnMode').value==='back'&&base.length>1)base=base.concat(base.slice(0,-1).reverse());return expandShape(base)}
function makeGpx(format){
const arr=routePoints(),name=esc($('fileName').value||'route'),type=$('gpxType').value,now=new Date().toISOString();
const creator=format==='itools'?'iTools GPX Export':format==='anyto'?'AnyTo GPX Export':'Final GPX Tool v4';
let s=`<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="${creator}" xmlns="http://www.topografix.com/GPX/1/1">\n<metadata><name>${name}</name><time>${now}</time></metadata>\n`;
if(format==='flashman'){
  arr.forEach((p,i)=>s+=`<wpt lat="${f(p.lat)}" lon="${f(p.lng)}"><name>${i+1}</name><desc>${f(p.lat)},${f(p.lng)}</desc></wpt>\n`);
}else if(format==='itools'){
  arr.forEach((p,i)=>s+=`<wpt lat="${f(p.lat)}" lon="${f(p.lng)}"><name>iTools_${i+1}</name><desc>${f(p.lat)},${f(p.lng)}</desc></wpt>\n`);
}else if(format==='anyto'){
  arr.forEach((p,i)=>s+=`<wpt lat="${f(p.lat)}" lon="${f(p.lng)}"><name>AnyTo_${i+1}</name><desc>${f(p.lat)},${f(p.lng)}</desc></wpt>\n`);
}else{
  if(type==='wpt'||type==='both')arr.forEach((p,i)=>s+=`<wpt lat="${f(p.lat)}" lon="${f(p.lng)}"><name>P${i+1}</name></wpt>\n`);
  if(type==='rte'||type==='both'){s+=`<rte><name>${name}</name>\n`;arr.forEach((p,i)=>s+=`<rtept lat="${f(p.lat)}" lon="${f(p.lng)}"><name>P${i+1}</name></rtept>\n`);s+=`</rte>\n`}
  if(type==='trk'){s+=`<trk><name>${name}</name><trkseg>\n`;arr.forEach(p=>s+=`<trkpt lat="${f(p.lat)}" lon="${f(p.lng)}"></trkpt>\n`);s+=`</trkseg></trk>\n`}
}
s+=`</gpx>\n`;return s}
$('makeGpxBtn').onclick=()=>{if(!points.length){alert('請先新增點位');return}const fmt=$('gpxFormat').value;$('gpxOut').value=makeGpx(fmt);$('gpxStatus').textContent=`已生成 ${routePoints().length} 個 GPX 點｜${fmt}`};
function download(format){if(!points.length){alert('請先新增點位');return}const text=makeGpx(format),suffix=format==='itools'?'_itools':format==='anyto'?'_anyto':'',name=($('fileName').value||'route').replace(/[\\\\/:*?"<>|]/g,'_')+suffix+'.gpx',blob=new Blob([text],{type:'application/gpx+xml;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click()}
$('downloadGpxBtn').onclick=()=>download($('gpxFormat').value);$('downloadItoolsBtn').onclick=()=>download('itools');$('downloadAnytoBtn').onclick=()=>download('anyto');$('copyCoordsBtn').onclick=()=>navigator.clipboard.writeText($('coordsOut').value);$('copyGpxBtn').onclick=()=>navigator.clipboard.writeText($('gpxOut').value);refresh();
</script></body></html>
