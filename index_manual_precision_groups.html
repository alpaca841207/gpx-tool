<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>GPX Tool Manual Precision</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
html,body{height:100%;margin:0;background:#07140d;color:#d8ffe0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
#app{height:100%;display:grid;grid-template-columns:390px 1fr}#left{background:#06140b;border-right:1px solid #1e5b35;padding:12px;overflow:auto}#map{height:100%;background:#111}
h1{font-size:16px;margin:0 0 10px;color:#7dff9a;letter-spacing:.08em}.box{border:1px solid #245d39;border-radius:10px;background:#0b2012;padding:10px;margin-bottom:10px}
label{display:block;font-size:13px;color:#a7d7b2;margin-top:8px}input,select,button,textarea{width:100%;box-sizing:border-box;margin-top:5px;padding:9px;border-radius:7px;border:1px solid #2e6b43;background:#0d1e13;color:#e9fff0}
button{background:#136b32;border-color:#2ea44f;font-weight:700;cursor:pointer}.secondary{background:#17291d;border-color:#375b42}.danger{background:#5b1616;border-color:#9a2d2d}
textarea{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px}.status{font-size:12px;line-height:1.45;background:#07140d;border:1px solid #2e6b43;border-radius:8px;padding:8px;margin-top:8px;color:#c7ffd4}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.marker-dot{width:24px;height:24px;border-radius:50%;color:#fff;border:2px solid #baffc7;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;box-shadow:0 0 10px #000}
.g0{background:#0d7d38}.g1{background:#2563eb}.g2{background:#d97706}.g3{background:#9333ea}.g4{background:#dc2626}.g5{background:#0891b2}.g6{background:#65a30d}.g7{background:#be185d}
.crosshair{position:absolute;left:50%;top:50%;width:28px;height:28px;margin-left:-14px;margin-top:-14px;z-index:500;pointer-events:none}.crosshair:before,.crosshair:after{content:"";position:absolute;background:#fff;box-shadow:0 0 3px #000}.crosshair:before{left:13px;top:0;width:2px;height:28px}.crosshair:after{left:0;top:13px;width:28px;height:2px}
.leaflet-control-layers,.leaflet-control-zoom{filter:invert(.85) hue-rotate(75deg)}.small{font-size:12px;color:#9bcda6;line-height:1.45}
</style></head><body><div id="app"><aside id="left">
<h1>GPX TOOL｜MANUAL PRECISION</h1>
<div class="box"><label>地圖中心座標</label><input id="centerInput" value="37.196446,36.577787" placeholder="lat,lng"><div class="row"><button id="goBtn">前往座標</button><button id="addCenterBtn" class="secondary">十字中心加點</button></div><label>縮放層級</label><select id="zoomSel"><option>14</option><option>15</option><option>16</option><option selected>17</option><option>18</option><option>19</option><option>20</option></select><button id="setZoomBtn" class="secondary">套用縮放</button><div class="status">改善偏移：拖曳地圖讓目標落在十字中心，再按「十字中心加點」。比手指直接點更準。</div></div>
<div class="box"><label>手動標點模式</label><select id="manualMode"><option value="center">十字中心加點（推薦）</option><option value="click">點擊地圖加點</option></select><div class="row"><button id="toggleClickBtn" class="secondary">點擊加點 開/關</button><button id="addCenterBtn2">新增中心點</button></div><div class="row"><button id="undoBtn" class="secondary">復原最後一點</button><button id="clearBtn" class="danger">清除全部</button></div><div class="status" id="pointStatus">點位 0</div></div>
<div class="box"><label>手動輸入座標新增</label><input id="manualCoord" placeholder="lat,lng"><button id="manualAddBtn" class="secondary">新增輸入座標</button></div>
<div class="box"><label>點位群組</label><select id="groupSelect"><option value="0">群組 1</option><option value="1">群組 2</option><option value="2">群組 3</option><option value="3">群組 4</option><option value="4">群組 5</option><option value="5">群組 6</option><option value="6">群組 7</option><option value="7">群組 8</option></select><label>自動群組距離 / m</label><input id="clusterM" type="number" value="120"><div class="row"><button id="autoGroupBtn" class="secondary">自動分群</button><button id="clearGroupBtn" class="secondary">全部群組1</button></div></div>
<div class="box"><label>路徑最佳化</label><select id="optMode"><option value="none">維持目前順序</option><option value="nearest">最近鄰最佳化</option><option value="twoopt">2-opt 最佳化</option><option value="grouped">依群組 + 群內最佳化</option></select><label>起點座標，可留空</label><input id="startCoord" placeholder="lat,lng"><div class="row"><button id="optBtn">套用最佳化</button><button id="reverseBtn" class="secondary">反轉順序</button></div><label>反向路徑</label><select id="returnMode"><option value="off">不加反向路徑</option><option value="back">加入逆行回程</option></select></div>
<div class="box"><label>GPX 生成設定</label><input id="fileName" value="manual_optimized_route" placeholder="檔名"><label>GPX 類型</label><select id="gpxType"><option value="wpt">Waypoint 點位</option><option value="rte">Route 路線</option><option value="trk">Track 軌跡</option><option value="both">Waypoint + Route</option></select><label>Waypoint 形狀</label><select id="shapeMode"><option value="center">僅中心點</option><option value="pentagon">五邊形繞點</option><option value="octagon">八邊形繞點</option></select><label>繞點半徑/m</label><input id="radiusM" type="number" value="20"><div class="row"><button id="makeGpxBtn">生成 GPX</button><button id="downloadGpxBtn" class="secondary">下載 GPX</button></div></div>
<div class="box"><label>GPS 座標</label><button id="copyCoordsBtn" class="secondary">複製座標</button><textarea id="coordsOut" rows="8"></textarea><label>含群組座標</label><textarea id="groupOut" rows="5"></textarea><label>GPX</label><button id="copyGpxBtn" class="secondary">複製 GPX</button><textarea id="gpxOut" rows="10"></textarea><div class="status" id="gpxStatus">尚未生成 GPX</div></div>
<div class="box small">長按/右鍵點位可刪除；拖曳點位可微調。建議 Z18~20 標點。</div>
</aside><main id="map"><div class="crosshair"></div></main></div>
<script>
const $=id=>document.getElementById(id);let points=[],markers=[],line=null,clickAdd=false;
function parseCoord(s){const a=s.split(',').map(v=>Number(v.trim()));if(a.length!==2||a.some(v=>!Number.isFinite(v)))throw Error('座標格式需為 lat,lng');return L.latLng(a[0],a[1]);}
function f(n){return Number(n).toFixed(6)}function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&apos;'}[c]))}
const init=parseCoord($('centerInput').value);const map=L.map('map',{zoomControl:true}).setView(init,17);
const layers={'OSM Standard':L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:20,attribution:'© OpenStreetMap'}),'Carto Light':L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',{maxZoom:20}),'Carto Dark':L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',{maxZoom:20})};layers['OSM Standard'].addTo(map);L.control.layers(layers,null,{collapsed:false,position:'topright'}).addTo(map);
function icon(group,i){return L.divIcon({className:'',html:`<div class="marker-dot g${group%8}">${i}</div>`,iconSize:[24,24],iconAnchor:[12,12]})}
function refresh(){markers.forEach(m=>m.remove());markers=[];if(line)line.remove();points.forEach((p,i)=>{const m=L.marker([p.lat,p.lng],{icon:icon(p.group||0,i+1),draggable:true}).addTo(map);m.on('dragend',e=>{const ll=e.target.getLatLng();p.lat=ll.lat;p.lng=ll.lng;refresh()});m.on('contextmenu',()=>{points.splice(i,1);refresh()});markers.push(m)});if(points.length>1)line=L.polyline(points.map(p=>[p.lat,p.lng]),{color:'#00ff66',weight:3,opacity:.85}).addTo(map);$('pointStatus').textContent=`點位 ${points.length}｜群組數 ${new Set(points.map(p=>p.group||0)).size||0}`;$('coordsOut').value=points.map(p=>`${f(p.lat)},${f(p.lng)}`).join('\n');$('groupOut').value=points.map((p,i)=>`${i+1},G${(p.group||0)+1},${f(p.lat)},${f(p.lng)}`).join('\n')}
function addPoint(ll,group=null){points.push({lat:ll.lat,lng:ll.lng,group:group===null?Number($('groupSelect').value):group});refresh()}
$('goBtn').onclick=()=>{try{map.setView(parseCoord($('centerInput').value),Number($('zoomSel').value))}catch(e){alert(e.message)}};$('setZoomBtn').onclick=()=>map.setZoom(Number($('zoomSel').value));$('addCenterBtn').onclick=()=>addPoint(map.getCenter());$('addCenterBtn2').onclick=()=>addPoint(map.getCenter());
$('toggleClickBtn').onclick=()=>{clickAdd=!clickAdd;$('pointStatus').textContent=clickAdd?'點擊加點中':'點位 '+points.length};map.on('click',e=>{if(clickAdd&&$('manualMode').value==='click')addPoint(e.latlng)});
$('manualAddBtn').onclick=()=>{try{addPoint(parseCoord($('manualCoord').value));$('manualCoord').value=''}catch(e){alert(e.message)}};$('undoBtn').onclick=()=>{points.pop();refresh()};$('clearBtn').onclick=()=>{if(confirm('確定清除全部點位？')){points=[];refresh();$('gpxOut').value=''}};$('reverseBtn').onclick=()=>{points.reverse();refresh()};$('clearGroupBtn').onclick=()=>{points.forEach(p=>p.group=0);refresh()};
function dist(a,b){const R=6371000,p1=a.lat*Math.PI/180,p2=b.lat*Math.PI/180,dp=(b.lat-a.lat)*Math.PI/180,dl=(b.lng-a.lng)*Math.PI/180,h=Math.sin(dp/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;return 2*R*Math.atan2(Math.sqrt(h),Math.sqrt(1-h))}
function centroid(arr){return{lat:arr.reduce((s,p)=>s+p.lat,0)/arr.length,lng:arr.reduce((s,p)=>s+p.lng,0)/arr.length}}
function nearest(arr,start){if(!arr.length)return[];const rem=arr.slice(),out=[];let cur=start||rem.shift();if(!start)out.push(cur);while(rem.length){let bi=0,bd=1e99;rem.forEach((p,i)=>{const d=dist(cur,p);if(d<bd){bd=d;bi=i}});cur=rem.splice(bi,1)[0];out.push(cur)}return out}
function routeLen(arr){let s=0;for(let i=0;i<arr.length-1;i++)s+=dist(arr[i],arr[i+1]);return s}
function twoOpt(arr){let best=arr.slice(),improved=true,guard=0;while(improved&&guard++<80){improved=false;for(let i=1;i<best.length-2;i++)for(let k=i+1;k<best.length-1;k++){const n=best.slice(0,i).concat(best.slice(i,k+1).reverse(),best.slice(k+1));if(routeLen(n)+0.01<routeLen(best)){best=n;improved=true}}}return best}
$('autoGroupBtn').onclick=()=>{const threshold=Number($('clusterM').value)||120;let groups=[];points.forEach(p=>{let gi=-1,bd=1e99;groups.forEach((g,i)=>{const d=dist(p,centroid(g));if(d<bd){bd=d;gi=i}});if(gi>=0&&bd<=threshold)groups[gi].push(p);else groups.push([p])});groups.forEach((g,i)=>g.forEach(p=>p.group=i%8));refresh()};
$('optBtn').onclick=()=>{if(points.length<2)return;let start=null;try{if($('startCoord').value.trim())start=parseCoord($('startCoord').value)}catch(e){alert(e.message);return}const mode=$('optMode').value;if(mode==='nearest')points=nearest(points,start);if(mode==='twoopt')points=twoOpt(nearest(points,start));if(mode==='grouped'){const gs=[...new Set(points.map(p=>p.group||0))].map(g=>points.filter(p=>(p.group||0)===g));let cent=gs.map((g,i)=>({lat:centroid(g).lat,lng:centroid(g).lng,i}));let order=nearest(cent,start).map(x=>x.i);let out=[];order.forEach(i=>{out=out.concat(twoOpt(nearest(gs[i],out.length?out[out.length-1]:start)))});points=out}refresh()};
function bearing(a,b){const y=Math.sin((b.lng-a.lng)*Math.PI/180)*Math.cos(b.lat*Math.PI/180),x=Math.cos(a.lat*Math.PI/180)*Math.sin(b.lat*Math.PI/180)-Math.sin(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.cos((b.lng-a.lng)*Math.PI/180);return(Math.atan2(y,x)*180/Math.PI+360)%360}
function offset(p,m,deg){const R=6378137,br=deg*Math.PI/180,la=p.lat*Math.PI/180,lo=p.lng*Math.PI/180,d=m/R,la2=Math.asin(Math.sin(la)*Math.cos(d)+Math.cos(la)*Math.sin(d)*Math.cos(br)),lo2=lo+Math.atan2(Math.sin(br)*Math.sin(d)*Math.cos(la),Math.cos(d)-Math.sin(la)*Math.sin(la2));return{lat:la2*180/Math.PI,lng:lo2*180/Math.PI,group:p.group}}
function expandShape(arr){const mode=$('shapeMode').value,r=Number($('radiusM').value)||0,out=[];arr.forEach((p,i)=>{const nb=arr[i+1]||arr[i-1]||p,br=Math.round(bearing(p,nb)/90)*90;if(mode==='center')out.push(p);else{const n=mode==='pentagon'?5:8;for(let k=0;k<n;k++)out.push(offset(p,r,br+k*360/n))}});return out}
function routePoints(){let base=points.slice();if($('returnMode').value==='back'&&base.length>1)base=base.concat(base.slice(0,-1).reverse());return expandShape(base)}
function makeGpx(){const arr=routePoints(),name=esc($('fileName').value||'route'),type=$('gpxType').value,now=new Date().toISOString();let s=`<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="GPX Tool Manual Precision" xmlns="http://www.topografix.com/GPX/1/1">\n<metadata><name>${name}</name><time>${now}</time></metadata>\n`;if(type==='wpt'||type==='both')arr.forEach((p,i)=>s+=`<wpt lat="${f(p.lat)}" lon="${f(p.lng)}"><name>G${(p.group||0)+1}-P${i+1}</name></wpt>\n`);if(type==='rte'||type==='both'){s+=`<rte><name>${name}</name>\n`;arr.forEach((p,i)=>s+=`<rtept lat="${f(p.lat)}" lon="${f(p.lng)}"><name>G${(p.group||0)+1}-P${i+1}</name></rtept>\n`);s+=`</rte>\n`}if(type==='trk'){s+=`<trk><name>${name}</name><trkseg>\n`;arr.forEach(p=>s+=`<trkpt lat="${f(p.lat)}" lon="${f(p.lng)}"></trkpt>\n`);s+=`</trkseg></trk>\n`}s+=`</gpx>\n`;return s}
$('makeGpxBtn').onclick=()=>{if(!points.length){alert('請先新增點位');return}$('gpxOut').value=makeGpx();$('gpxStatus').textContent=`已生成 ${routePoints().length} 個 GPX 點`};
$('downloadGpxBtn').onclick=()=>{if(!points.length){alert('請先新增點位');return}const text=$('gpxOut').value||makeGpx(),name=($('fileName').value||'route').replace(/[\\/:*?"<>|]/g,'_')+'.gpx',blob=new Blob([text],{type:'application/gpx+xml;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click()};
$('copyCoordsBtn').onclick=()=>navigator.clipboard.writeText($('coordsOut').value);$('copyGpxBtn').onclick=()=>navigator.clipboard.writeText($('gpxOut').value);refresh();
</script></body></html>
