<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GPX Tool Precision Overlay</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
html,body{height:100%;margin:0;background:#07140d;color:#d8ffe0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
#app{height:100%;display:grid;grid-template-columns:390px 1fr}
#left{background:#06140b;border-right:1px solid #1e5b35;padding:12px;overflow:auto}
#map{height:100%;background:#111}
.box{border:1px solid #245d39;border-radius:10px;background:#0b2012;padding:10px;margin-bottom:10px}
h1{font-size:16px;margin:0 0 10px;color:#7dff9a;letter-spacing:.08em}
label{display:block;font-size:13px;color:#a7d7b2;margin-top:8px}
input,select,button,textarea{width:100%;box-sizing:border-box;margin-top:5px;padding:9px;border-radius:7px;border:1px solid #2e6b43;background:#0d1e13;color:#e9fff0}
button{background:#136b32;border-color:#2ea44f;font-weight:700;cursor:pointer}
.secondary{background:#17291d;border-color:#375b42}.danger{background:#5b1616;border-color:#9a2d2d}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.status{font-size:12px;line-height:1.45;background:#07140d;border:1px solid #2e6b43;border-radius:8px;padding:8px;margin-top:8px;color:#c7ffd4}
textarea{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px}
.crosshair{position:absolute;left:50%;top:50%;width:30px;height:30px;margin-left:-15px;margin-top:-15px;z-index:600;pointer-events:none}
.crosshair:before,.crosshair:after{content:"";position:absolute;background:#fff;box-shadow:0 0 3px #000}
.crosshair:before{left:14px;top:0;width:2px;height:30px}.crosshair:after{left:0;top:14px;width:30px;height:2px}
.overlay-img{position:absolute;transform-origin:center center;pointer-events:none;z-index:350;will-change:transform,opacity}
.marker-dot{width:24px;height:24px;border-radius:50%;background:#0d7d38;color:#fff;border:2px solid #baffc7;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;box-shadow:0 0 10px #000}
.small{font-size:12px;color:#9bcda6;line-height:1.45}
</style>
</head>
<body>
<div id="app">
<aside id="left">
<h1>GPX TOOL｜PRECISION OVERLAY</h1>

<div class="box">
<label>地圖中心座標</label>
<input id="centerInput" value="37.196446,36.577787" placeholder="lat,lng">
<div class="row"><button id="goBtn">前往座標</button><button id="addCenterBtn">十字中心加點</button></div>
<label>縮放層級</label>
<select id="zoomSel"><option>15</option><option>16</option><option selected>17</option><option>18</option><option>19</option><option>20</option></select>
<button id="setZoomBtn" class="secondary">套用縮放</button>
</div>

<div class="box">
<label>截圖 Overlay</label>
<input id="fileInput" type="file" accept="image/*">
<label>透明度</label><input id="opacity" type="range" min="0.05" max="1" step="0.05" value="0.55">
<div class="row"><button id="toggleOverlay" class="secondary">顯示/隱藏</button><button id="clearOverlay" class="danger">移除截圖</button></div>
<div class="status" id="imgStatus">尚未載入截圖</div>
</div>

<div class="box">
<label>精準校正</label>
<div class="row3">
<button onclick="moveOverlay(0,1)">↑</button>
<button onclick="moveOverlay(-1,0)">←</button>
<button onclick="moveOverlay(1,0)">→</button>
</div>
<button onclick="moveOverlay(0,-1)">↓</button>
<label>平移步距 / 公尺</label>
<select id="moveStep"><option value="0.5">0.5m</option><option value="1" selected>1m</option><option value="3">3m</option><option value="5">5m</option><option value="10">10m</option></select>
<div class="row"><button onclick="scaleOverlay(1.002)">放大 0.2%</button><button onclick="scaleOverlay(0.998)">縮小 0.2%</button></div>
<div class="row"><button onclick="rotateOverlay(-0.2)">左轉 0.2°</button><button onclick="rotateOverlay(0.2)">右轉 0.2°</button></div>
<div class="row"><button onclick="rotateOverlay(-1)" class="secondary">左轉 1°</button><button onclick="rotateOverlay(1)" class="secondary">右轉 1°</button></div>
<button id="resetOverlay" class="secondary">重置截圖位置</button>
<div class="status" id="overlayStatus">中心：--｜縮放：1.000｜旋轉：0°</div>
</div>

<div class="box">
<label>標點</label>
<div class="row"><button id="toggleClickBtn" class="secondary">點擊加點 開/關</button><button id="undoBtn" class="secondary">復原</button></div>
<div class="row"><button id="clearBtn" class="danger">清除點位</button><button id="reverseBtn" class="secondary">反轉順序</button></div>
<div class="status" id="pointStatus">點位 0</div>
</div>

<div class="box">
<label>GPX</label>
<input id="fileName" value="precision_route">
<select id="gpxType"><option value="rte">Route</option><option value="wpt">Waypoint</option><option value="trk">Track</option><option value="both">Waypoint + Route</option></select>
<select id="returnMode"><option value="off">單向路徑</option><option value="back">反向路徑（逆行回去）</option></select>
<div class="row"><button id="makeGpxBtn">生成 GPX</button><button id="downloadGpxBtn" class="secondary">下載 GPX</button></div>
</div>

<div class="box">
<label>GPS 座標</label><button id="copyCoordsBtn" class="secondary">複製座標</button><textarea id="coordsOut" rows="8"></textarea>
<label>GPX</label><button id="copyGpxBtn" class="secondary">複製 GPX</button><textarea id="gpxOut" rows="10"></textarea>
<div class="status" id="gpxStatus">尚未生成 GPX</div>
</div>

<div class="box small">
精準流程：載入截圖 → 調透明度 → 用平移/縮放/旋轉讓道路貼合 OSM → 拖地圖讓目標落在十字中心 → 中心加點。
</div>
</aside>
<main id="map"><div class="crosshair"></div></main>
</div>

<script>
const $=id=>document.getElementById(id);
let points=[],markers=[],line=null,clickAdd=false;
let overlayEl=null, overlayUrl=null, overlayCenter=null, overlayScale=1, overlayRot=0, overlayVisible=true, imgW=0, imgH=0;

function parseCoord(s){const a=s.split(',').map(v=>Number(v.trim()));if(a.length!==2||a.some(v=>!Number.isFinite(v)))throw Error('座標格式需為 lat,lng');return L.latLng(a[0],a[1]);}
function f(n){return Number(n).toFixed(6)}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&apos;'}[c]))}

const init=parseCoord($('centerInput').value);
const map=L.map('map',{zoomControl:true}).setView(init,17);
const layers={
 'OSM Standard':L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:20,attribution:'© OpenStreetMap'}),
 'Carto Light':L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',{maxZoom:20}),
 'Carto Dark':L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',{maxZoom:20})
};
layers['OSM Standard'].addTo(map);
L.control.layers(layers,null,{collapsed:false,position:'topright'}).addTo(map);

const overlayPane=map.createPane('precisionOverlay');
overlayPane.style.zIndex=350;
overlayPane.style.pointerEvents='none';

function mpp(){
 const z=map.getZoom(), c=map.getCenter();
 return 156543.03392*Math.cos(c.lat*Math.PI/180)/Math.pow(2,z);
}
function updateOverlay(){
 if(!overlayEl||!overlayCenter)return;
 const p=map.latLngToLayerPoint(overlayCenter);
 const baseScale=0.65;
 const pxScale=baseScale*overlayScale;
 overlayEl.style.left=(p.x-imgW*pxScale/2)+'px';
 overlayEl.style.top=(p.y-imgH*pxScale/2)+'px';
 overlayEl.style.width=(imgW*pxScale)+'px';
 overlayEl.style.height=(imgH*pxScale)+'px';
 overlayEl.style.opacity=overlayVisible?$('opacity').value:0;
 overlayEl.style.transform=`rotate(${overlayRot}deg)`;
 $('overlayStatus').textContent=`中心：${f(overlayCenter.lat)},${f(overlayCenter.lng)}｜縮放：${overlayScale.toFixed(3)}｜旋轉：${overlayRot.toFixed(1)}°`;
}
function createOverlay(url,w,h){
 if(overlayEl)overlayEl.remove();
 imgW=w; imgH=h; overlayUrl=url; overlayCenter=map.getCenter(); overlayScale=1; overlayRot=0; overlayVisible=true;
 overlayEl=document.createElement('img');
 overlayEl.src=url; overlayEl.className='overlay-img';
 overlayPane.appendChild(overlayEl);
 updateOverlay();
 $('imgStatus').textContent=`已載入截圖 ${w}×${h}`;
}
$('fileInput').onchange=e=>{
 const file=e.target.files[0]; if(!file)return;
 const r=new FileReader();
 r.onload=ev=>{
  const img=new Image();
  img.onload=()=>createOverlay(ev.target.result,img.width,img.height);
  img.src=ev.target.result;
 };
 r.readAsDataURL(file);
};
$('opacity').oninput=updateOverlay;
$('toggleOverlay').onclick=()=>{overlayVisible=!overlayVisible;updateOverlay()};
$('clearOverlay').onclick=()=>{if(overlayEl)overlayEl.remove();overlayEl=null;overlayCenter=null;$('imgStatus').textContent='尚未載入截圖';$('overlayStatus').textContent='中心：--｜縮放：1.000｜旋轉：0°'};
$('resetOverlay').onclick=()=>{if(!overlayEl)return;overlayCenter=map.getCenter();overlayScale=1;overlayRot=0;updateOverlay()};

function destination(latlng, meters, bearingDeg){
 const R=6378137, br=bearingDeg*Math.PI/180, lat1=latlng.lat*Math.PI/180, lon1=latlng.lng*Math.PI/180, d=meters/R;
 const lat2=Math.asin(Math.sin(lat1)*Math.cos(d)+Math.cos(lat1)*Math.sin(d)*Math.cos(br));
 const lon2=lon1+Math.atan2(Math.sin(br)*Math.sin(d)*Math.cos(lat1),Math.cos(d)-Math.sin(lat1)*Math.sin(lat2));
 return L.latLng(lat2*180/Math.PI, lon2*180/Math.PI);
}
function moveOverlay(x,y){
 if(!overlayCenter)return;
 const step=Number($('moveStep').value)||1;
 // screen directions: up = north, right = east
 if(y>0) overlayCenter=destination(overlayCenter,step,0);
 if(y<0) overlayCenter=destination(overlayCenter,step,180);
 if(x>0) overlayCenter=destination(overlayCenter,step,90);
 if(x<0) overlayCenter=destination(overlayCenter,step,270);
 updateOverlay();
}
function scaleOverlay(fac){if(!overlayEl)return;overlayScale*=fac;updateOverlay()}
function rotateOverlay(deg){if(!overlayEl)return;overlayRot+=deg;updateOverlay()}
map.on('zoom move viewreset',updateOverlay);

function icon(i){return L.divIcon({className:'',html:`<div class="marker-dot">${i}</div>`,iconSize:[24,24],iconAnchor:[12,12]})}
function refresh(){
 markers.forEach(m=>m.remove());markers=[];
 if(line)line.remove();
 points.forEach((p,i)=>{
  const m=L.marker([p.lat,p.lng],{icon:icon(i+1),draggable:true}).addTo(map);
  m.on('dragend',e=>{const ll=e.target.getLatLng();p.lat=ll.lat;p.lng=ll.lng;refresh()});
  m.on('contextmenu',()=>{points.splice(i,1);refresh()});
  markers.push(m);
 });
 if(points.length>1)line=L.polyline(points.map(p=>[p.lat,p.lng]),{color:'#00ff66',weight:3,opacity:.85}).addTo(map);
 $('pointStatus').textContent=`點位 ${points.length}`;
 $('coordsOut').value=points.map(p=>`${f(p.lat)},${f(p.lng)}`).join('\\n');
}
function addPoint(ll){points.push({lat:ll.lat,lng:ll.lng});refresh()}
$('goBtn').onclick=()=>{try{map.setView(parseCoord($('centerInput').value),Number($('zoomSel').value))}catch(e){alert(e.message)}};
$('setZoomBtn').onclick=()=>map.setZoom(Number($('zoomSel').value));
$('addCenterBtn').onclick=()=>addPoint(map.getCenter());
$('toggleClickBtn').onclick=()=>{clickAdd=!clickAdd;$('pointStatus').textContent=clickAdd?'點擊加點中':'點位 '+points.length};
map.on('click',e=>{if(clickAdd)addPoint(e.latlng)});
$('undoBtn').onclick=()=>{points.pop();refresh()};
$('clearBtn').onclick=()=>{if(confirm('確定清除全部點位？')){points=[];refresh();$('gpxOut').value=''}};
$('reverseBtn').onclick=()=>{points.reverse();refresh()};

function routePoints(){
 let base=points.slice();
 if($('returnMode').value==='back'&&base.length>1)base=base.concat(base.slice(0,-1).reverse());
 return base;
}
function makeGpx(){
 const arr=routePoints(), name=esc($('fileName').value||'route'), type=$('gpxType').value, now=new Date().toISOString();
 let s=`<?xml version="1.0" encoding="UTF-8"?>\\n<gpx version="1.1" creator="GPX Tool Precision Overlay" xmlns="http://www.topografix.com/GPX/1/1">\\n<metadata><name>${name}</name><time>${now}</time></metadata>\\n`;
 if(type==='wpt'||type==='both')arr.forEach((p,i)=>s+=`<wpt lat="${f(p.lat)}" lon="${f(p.lng)}"><name>P${i+1}</name></wpt>\\n`);
 if(type==='rte'||type==='both'){s+=`<rte><name>${name}</name>\\n`;arr.forEach((p,i)=>s+=`<rtept lat="${f(p.lat)}" lon="${f(p.lng)}"><name>P${i+1}</name></rtept>\\n`);s+=`</rte>\\n`;}
 if(type==='trk'){s+=`<trk><name>${name}</name><trkseg>\\n`;arr.forEach(p=>s+=`<trkpt lat="${f(p.lat)}" lon="${f(p.lng)}"></trkpt>\\n`);s+=`</trkseg></trk>\\n`;}
 s+=`</gpx>\\n`;return s;
}
$('makeGpxBtn').onclick=()=>{if(!points.length){alert('請先新增點位');return}$('gpxOut').value=makeGpx();$('gpxStatus').textContent=`已生成 ${routePoints().length} 個 GPX 點`};
$('downloadGpxBtn').onclick=()=>{if(!points.length){alert('請先新增點位');return}const text=$('gpxOut').value||makeGpx(),name=($('fileName').value||'route').replace(/[\\\\/:*?"<>|]/g,'_')+'.gpx',blob=new Blob([text],{type:'application/gpx+xml;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click()};
$('copyCoordsBtn').onclick=()=>navigator.clipboard.writeText($('coordsOut').value);
$('copyGpxBtn').onclick=()=>navigator.clipboard.writeText($('gpxOut').value);
refresh();
</script>
</body>
</html>
